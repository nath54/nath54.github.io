    text_en: "I found a new planet and named it 'Nathan-7'. It's mostly made of coffee and code."
    text_fr: "J'ai trouvé une nouvelle planète et je l'ai nommée 'Nathan-7'. Elle est principalement composée de café et de code."
  - user: "ShaderWizard"
    rating: 5
    text_en: "My GPU is screaming but these nebulae are worth it. So much noise, so little time."
    text_fr: "Mon GPU hurle mais ces nébuleuses en valent la peine. Tellement de bruit, si peu de temps."
  - user: "FlatEarther"
    rating: 1
    text_en: "The stars look too round. Fake news."
    text_fr: "Les étoiles ont l'air trop rondes. Fake news."
