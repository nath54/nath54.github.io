    rating: 5
    text_en: "I put this on my VR headset and now I'm floating in my living room."
    text_fr: "J'ai mis ça sur mon casque VR et maintenant je flotte dans mon salon."
  - user: "BlackHoleSun"
    rating: 4
    text_en: "I got too close to a black hole and it deleted my browser history. Thanks?"
    text_fr: "Je me suis approché trop près d'un trou noir et ça a effacé mon historique de navigation. Merci ?"
