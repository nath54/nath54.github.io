    <script>
        window.addEventListener('DOMContentLoaded', () => {

            NApp.init({"state": {"current_page": "PersonalBlog_v1", "language": "en", "app_theme": "light"}, "data": {"about_me": {"My_Hobbies.md": {"title_en": "My Hobbies", "title_fr": "Mes Hobbies", "sections": [{"sub_title_en": "Board games and Game of Roles", "content_en": "<p>I like playing board games and game of roles with my friends and my family.</p>\n<p>Example of board games I like:</p>\n<h3><strong>Classic and Traditional Card Games</strong></h3>\n<p>Traditional trick-taking and betting games played with standard decks.</p>\n<ul>\n<li>Examples:<ul>\n<li>Belote</li>\n<li>Tarot</li>\n<li>Poker</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Fast-Paced Deck and Hand Management</strong></h3>\n<p>Modern card games focused on card combinations, set collection, and hand clearing.</p>\n<ul>\n<li>Examples:<ul>\n<li>Gang of 4</li>\n<li>President</li>\n<li>7 Yokai</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Social Deduction and Communication</strong></h3>\n<p>Games centered on word association, hidden information, and collective interpretation.</p>\n<ul>\n<li>Examples:<ul>\n<li>Codenames</li>\n<li>Dixit</li>\n<li>Blanc Manger Coco</li>\n<li>Danny</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Tactical Engine Building</strong></h3>\n<p>Resource management games where players optimize actions to build an efficient scoring system.</p>\n<ul>\n<li>Examples:<ul>\n<li>Azul</li>\n<li>Splendor</li>\n<li>Rebirth</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Tile-Laying and Territorial Expansion</strong></h3>\n<p>Strategic placement games focused on building landscapes and claiming space on a shared board.</p>\n<ul>\n<li>Examples:<ul>\n<li>Carcassonne</li>\n<li>Kingdomino</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Area Control and Strategy</strong></h3>\n<p>Macro-strategy games involving territorial dominance, resource competition, and conflict management.</p>\n<ul>\n<li>Examples:<ul>\n<li>Risk</li>\n<li>Scythe</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Cooperative and Puzzle Solving</strong></h3>\n<p>Team-based or logic-driven games centered on shared objectives and mechanical problem-solving.</p>\n<ul>\n<li>Examples:<ul>\n<li>The Gang</li>\n<li>Take Time</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Competitive Duel and Confrontation</strong></h3>\n<p>Strictly 1v1 formats featuring hidden movement, tactical positioning, or collectible deck building.</p>\n<ul>\n<li>Examples:<ul>\n<li>Tag Team</li>\n<li>Zenith</li>\n<li>Stratego</li>\n<li>Magic: The Gathering</li>\n</ul>\n</li>\n</ul>", "sub_title_fr": "Jeux de soci\u00e9t\u00e9 et jeux de r\u00f4les", "content_fr": "<p>J'aime jouer \u00e0 des jeux de soci\u00e9t\u00e9 et des jeux de r\u00f4les avec mes amis et ma famille.</p>\n<p>Voici des exemples de jeux de soci\u00e9t\u00e9 que j'aime bien :</p>\n<h3><strong>Jeux de cartes classiques et traditionnels</strong></h3>\n<p>Jeux de plis et de paris traditionnels jou\u00e9s avec des jeux de cartes standards.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Belote</li>\n<li>Tarot</li>\n<li>Poker</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de cartes modernes rapides</strong></h3>\n<p>Jeux de cartes modernes ax\u00e9s sur la combinaison de cartes, la collection de sets et le vidage de main.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Gang of 4</li>\n<li>Pr\u00e9sident</li>\n<li>7 Yokai</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de d\u00e9duction sociale et de communication</strong></h3>\n<p>Jeux centr\u00e9s sur l'association de mots, l'information cach\u00e9e et l'interpr\u00e9tation collective.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Codenames</li>\n<li>Dixit</li>\n<li>Blanc Manger Coco</li>\n<li>Danny</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de construction de moteur tactique</strong></h3>\n<p>Jeux de gestion de ressources o\u00f9 les joueurs optimisent les actions pour construire un syst\u00e8me de score efficace.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Azul</li>\n<li>Splendor</li>\n<li>Rebirth</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de placement de tuiles et d'expansion territoriale</strong></h3>\n<p>Jeux de placement strat\u00e9gique ax\u00e9s sur la construction de paysages et la revendication d'espace sur un plateau partag\u00e9.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Carcassonne</li>\n<li>Kingdomino</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de contr\u00f4le de zone et de strat\u00e9gie</strong></h3>\n<p>Jeux de macro-strat\u00e9gie impliquant la domination territoriale, la comp\u00e9tition pour les ressources et la gestion des conflits.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Risk</li>\n<li>Scythe</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux coop\u00e9ratifs et de r\u00e9solution de probl\u00e8mes</strong></h3>\n<p>Jeux d'\u00e9quipe ou bas\u00e9s sur la logique, centr\u00e9s sur des objectifs communs et la r\u00e9solution de probl\u00e8mes m\u00e9caniques.</p>\n<ul>\n<li>Exemples :<ul>\n<li>The Gang</li>\n<li>Take Time</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux comp\u00e9titifs et de confrontation</strong></h3>\n<p>Formats strictement 1v1 mettant en sc\u00e8ne des mouvements cach\u00e9s, un positionnement tactique ou la construction de decks \u00e0 collectionner.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Tag Team</li>\n<li>Zenith</li>\n<li>Stratego</li>\n<li>Magic: The Gathering</li>\n</ul>\n</li>\n</ul>"}, {"sub_title_en": "Sports", "content_en": "<p>I love playing and watching some sports, especially:</p>\n<h3><strong>Basket-ball</strong>:</h3>\n<p>I practiced in club, and now regularly outdoor, and I like following the NBA.</p>\n<h3><strong>Volley-ball</strong>:</h3>\n<p>I practiced, especially when I was in CPGE.</p>\n<h3><strong>Cycling</strong>:</h3>\n<p>I like doing bike, and following the Tour de France, Paris-Nice, La Vuelta, Le Giro, Les classiques...</p>", "sub_title_fr": "Sports", "content_fr": "<p>J'aime jouer et regarder certains sports, en particulier :</p>\n<h3><strong>Basket-ball</strong>:</h3>\n<p>J'ai pratiqu\u00e9 en club, et maintenant r\u00e9guli\u00e8rement en ext\u00e9rieur, et j'aime suivre la NBA.</p>\n<h3><strong>Volley-ball</strong>:</h3>\n<p>J'ai pratiqu\u00e9, surtout quand j'\u00e9tais en CPGE.</p>\n<h3><strong>Cyclisme</strong>:</h3>\n<p>J'aime faire du v\u00e9lo, et suivre le Tour de France, Paris-Nice, La Vuelta, Le Giro, Les classiques...</p>"}, {"sub_title_en": "Computer Science and Development", "content_en": "<p>I started programming when I was very young, and started with Python and basic web development (HTML, CSS, JS).\nI started trying to programming my own video-games, and created random websites, until I did more serious projects during my studies.</p>", "sub_title_fr": "Informatique et d\u00e9veloppement", "content_fr": "<p>J'ai commenc\u00e9 \u00e0 programmer quand j'\u00e9tais tr\u00e8s jeune, et j'ai commenc\u00e9 avec Python et le d\u00e9veloppement web de base (HTML, CSS, JS).\nJ'ai commenc\u00e9 \u00e0 essayer de programmer mes propres jeux vid\u00e9o, et j'ai cr\u00e9\u00e9 des sites web al\u00e9atoires, jusqu'\u00e0 ce que je fasse des projets plus s\u00e9rieux pendant mes \u00e9tudes.</p>"}, {"sub_title_en": "Creation and Art", "content_en": "<p>I like creating and making art. I like drawing, and I like making music (writing lyrics or composing music).\nI also like writing stories, poems, and novels.\nI also like making 3d renderings, pixel/voxel art, and other forms of digital art.</p>", "sub_title_fr": "Cr\u00e9ativit\u00e9 et art", "content_fr": "<p>J'aime cr\u00e9er et faire de l'art. J'aime dessiner, et j'aime faire de la musique (\u00e9crire des paroles ou composer de la musique).\nJ'aime aussi \u00e9crire des histoires, des po\u00e8mes et des romans.\nJ'aime aussi faire des rendus 3D, du pixel/voxel art, et d'autres formes d'art num\u00e9rique.</p>"}, {"sub_title_en": "Listening Music", "content_en": "<h3><strong>Dark Folk / Ethereal Pop</strong></h3>\n<p>Atmospheric music utilizing organic instrumentation, unique vocal timbres, and narrative-focused lyrics.</p>\n<ul>\n<li><strong>Key Artists</strong>:<ul>\n<li>AURORA <a href=\"https://music.youtube.com/channel/UCNjHgaLpdy1IMNK57pYiKiQ\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/1WgXqy2Dd70QQOU7Ay074N\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Wardruna <a href=\"https://music.youtube.com/channel/UCoK2X3nnuG7ug-Kk75r5rJQ\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/0NJ6wlOAsAJ1PN4VRdTPKA\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Kiki Rockwell <a href=\"https://music.youtube.com/channel/UCe1-VmcTA_819-tJb1Z3nKA\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/5HuKMWteBRI09tWyKeQE1F\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>East-Duo <a href=\"https://music.youtube.com/channel/UCxSP05H8BEdpu3Q0RYeGOrA\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/42v0kfdXXwjA3cLRr4DTyY\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>...</li>\n</ul>\n</li>\n<li><strong>Example Tracks</strong>:<ul>\n<li>AURORA - Running With The Wolves <a href=\"https://music.youtube.com/watch?v=06ht9MyJLT4\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/6r6n5OmXkdsOxN2iCj5UE0\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>AURORA - Everything Matters <a href=\"https://music.youtube.com/watch?v=U0qHsWAZ4xU\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/1rMlnD8S0hX7IHZXZDt3gH\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>...</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Modern Dark Pop / Electropop</strong></h3>\n<p>High-fidelity pop featuring moody synths, atmospheric production, and non-traditional vocal styles.</p>\n<ul>\n<li><strong>Key Artists</strong>:<ul>\n<li>Billie Eilish <a href=\"https://music.youtube.com/channel/UCiGm_E4ZwYSHV3bcW1pnSeQ\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/6qqNVTkY8uBg9cP3Jd7DAH\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Katy Perry <a href=\"https://music.youtube.com/channel/UCYvmuw-JtVrTZQ-7Y4kd63Q\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/6jJ0s89eD6GaHleKKya26X\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Lil Nas X <a href=\"https://music.youtube.com/channel/UC_uMv3bNXwapHl8Dzf2p01Q\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/7jVv8c5Fj3E9VhNjxT4snq\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>...</li>\n</ul>\n</li>\n<li><strong>Example Tracks</strong>:<ul>\n<li>Billie Eilish - CHIHIRO <a href=\"https://music.youtube.com/watch?v=zYEKeEOKNi0\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/7BRD7x5pt8Lqa1eGYC4dzj\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Katy Perry - Dark Horse <a href=\"https://music.youtube.com/watch?v=0KSOMA3QBU0\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/5jrdCoLpJSvHHorevXBATy\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Lil Nas X - STAR WALKIN' <a href=\"https://music.youtube.com/watch?v=v7HAVTyvLqI\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/38T0tPVZHcPZyhtOcCP7pF\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>...</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Sad Emotional Pop</strong></h3>\n<ul>\n<li><strong>Key Artists</strong>:<ul>\n<li>Alexander Stewart <a href=\"https://music.youtube.com/channel/UCOnuUddDN2ssa2q__2OW6qg\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/0znpFLuaey34oJTE1jHSnT\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Alex Warren <a href=\"https://music.youtube.com/channel/UCX2Pm1JoWF3chsVOR9e1hbQ\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/0fTSzq9jAh4c36UVb4V7CB\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li 9G1VOjN_84\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/1r9xUipOqoNwggBpENDsvJ\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Against the Current - Legends Never Die <a href=\"https://music.youtube.com/watch?v=BSt0pCVluqs\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/4LhgwcTWwJQc6DFTkLXVEc\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>...</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Genre-Bending Art Pop / Alt-RnB</strong></h3>\n<p>Experimental pop that incorporates elements of jazz, soul, and electronic music with a focus on mood and texture.</p>\n<ul>\n<li><strong>Key Artists</strong>:<ul>\n<li>DPR IAN <a href=\"https://music.youtube.com/channel/UCvU5Hv5JLB9KHc2jtk6S8wg\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/2o8gT0fQmFxGNbowbdgeZe\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Halsey <a href=\"https://music.youtube.com/channel/UCOCgB3xd-B-1qAm-hR9OLrA\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/26VFTg2z8YR0cCuwLzESi2\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Neoni <a href=\"https://music.youtube.com/channel/UCQJ-a2IzCJ-gwlHvqvOWGhw\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/38wxcfNEqMwuPniHvplin5\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>...</li>\n</ul>\n</li>\n<li><strong>Example Tracks</strong>:<ul>\n<li>DPR IAN - Don't Go Insane <a href=\"https://music.youtube.com/watch?v=nZ5SfoLB5yA\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/5izX3yhDZHqQFi8p2m6RHi\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Neoni - Machine <a href=\"https://music.youtube.com/watch?v=-vohFdm8lxA\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/6irGNPMTBfTR98BqEIPckn\"><i class=\"fa-brands fa-sp  also like reading webtoons.</p>\n<p>Here are some of my favorites:</p>\n<ul>\n<li>\n<p><strong>Classical shonen:</strong></p>\n<ul>\n<li>Hunter X Hunter</li>\n<li>Dragon Ball</li>\n</ul>\n</li>\n<li>\n<p><strong>Dark Fantasy / seinen:</strong></p>\n<ul>\n<li>Vinland Saga</li>\n<li>Berserk</li>\n<li>Tokyo Ghoul</li>\n<li>Fate Series</li>\n</ul>\n</li>\n<li>\n<p><strong>System Fantasy / Isekai:</strong></p>\n<ul>\n<li>Solo Leveling</li>\n<li>Re:Zero</li>\n<li>The Beginning After the End</li>\n<li>The Rising of the Shield Hero</li>\n</ul>\n</li>\n<li>\n<p><strong>Contemplative Fantasy:</strong></p>\n<ul>\n<li>Frieren</li>\n</ul>\n</li>\n<li>\n<p><strong>Strategic Thriller:</strong></p>\n<ul>\n<li>Death Note</li>\n<li>Code Geass</li>\n<li>Psycho-Pass</li>\n</ul>\n</li>\n<li>\n<p><strong>Psychological:</strong></p>\n<ul>\n<li>Orb: On the Movements of the Earth</li>\n<li>To your eternity</li>\n<li>The Darwin Incident</li>\n<li>Lazarus</li>\n<li>Oshi No Ko</li>\n<li>Promised Neverland</li>\n<li>Parasyte</li>\n<li>Guilty Crown</li>\n</ul>\n</li>\n<li>\n<p><strong>Music:</strong></p>\n<ul>\n<li>Beck</li>\n<li>Bocchi the Rock!</li>\n<li>Nana</li>\n<li>Blue Orchestra</li>\n<li>Carole and Tuesday</li>\n<li>Your Lie in April</li>\n<li>KPop Demon Hunter</li>\n</ul>\n</li>\n<li>\n<p><strong>Sport:</strong></p>\n<ul>\n<li>Kuroko no basket</li>\n<li>Slam Dunk</li>\n<li>Haikyu!!</li>\n<li>Blue Lock</li>\n</ul>\n</li>\n<li>\n<p><strong>Romance:</strong></p>\n<ul>\n<li>Kaguya-sama: Love is War</li>\n<li>Golden Time</li>\n<li>Blue Box</li>\n</ul>\n</li>\n<li>\n<p><strong>Sci-fi:</strong></p>\n<ul>\n<li>Cyberpunk: Edgerunners</li>\n</ul>\n</li>\n</ul>", "sub_title_fr": "Manga / Animes / Webtoons", "content_fr": "<p>J'aime lire des mangas et regarder des animes. J'aime aussi lire des webtoons.</p>\n<p>Voici quelques-uns de mes pr\u00e9f\u00e9r\u00e9s:</p>\n<ul>\n<li>\n<p><strong>Shonen classique:</strong></p>\n<ul>\n<li>Hunter X Hunter</li>\n<li>Dragon Ball</li>\n</ul>\n</li>\n<li>\n<p><strong>Fantasy Sombre / Seinen:</strong></p>\n<ul>\n<li>Vinland Saga</li>\n<li>Berserk</li>\n<li>Tokyo Ghoul</li>\n<li>Fate Series</li>\n</ul>\n</li>\n<li>\n<p><strong>Fantasy bas\u00e9e sur des syst\u00e8mes / Isekai:</strong></p>\n<ul>\n<li>Solo Leveling</li>\n<li>Re:Zero</li>\n<li>The Beginning After the End</li>\n<li>The Rising of the Shield Hero</li>\n</ul>\n</li>\n<li>\n<p><strong>Fantasy Contemplative:</strong></p>\n<ul>\n<li>Frieren</li>\n</ul>\n</li>\n<li>\n<p><strong>Thriller Strat\u00e9gique:</strong></p>\n<ul>\n<li>Death Note</li>\n<li>Code Geass</li>\n<li>Psycho-Pass</li>\n</ul>\n</li>\n<li>\n<p><strong>Psychologique:</strong></p>\n<ul>\n<li>Orb: On the Movements of the Earth</li>\n<li>To your eternity</li>\n<li>The Darwin Incident</li>\n<li>Lazarus</li>\n<li>Oshi No Ko</li>\n<li>Promised Neverland</li>\n<li>Parasyte</li>\n<li>Guilty Crown</li>\n</ul>\n</li>\n<li>\n<p><strong>Musique:</strong></p>\n<ul>\n<li>Beck</li>\n<li>Bocchi the Rock!</li>\n<li>Nana</li>\n<li>Blue Orchestra</li>\n<li>Carole and Tuesday</li>\n<li>Your Lie in April</li>\n<li>KPop Demon Hunter</li>\n</ul>\n</li>\n<li>\n<p><strong>Sport:</strong></p>\n<ul>\n<li>Kuroko no basket</li>\n<li>Slam Dunk</li>\n<li>Haikyu!!</li>\n<li>Blue Lock</li>\n</ul>\n</li>\n<li>\n<p><strong>Romance:</strong></p>\n<ul>\n<li>Kaguya-sama: Love is War</li>\n<li>Golden Time</li>\n<li>Blue Box</li>\n</ul>\n</li>\n<li>\n<p><strong>Sci-fi:</strong></p>\n<ul>\n<li>Cyberpunk: Edgerunners</li>\n</ul>\n</li>\n</ul>"}, {"sub_title_en": "Reading Books", "content_en": "<p>I like reading books.</p>\n<p>Here are some of my favorites:</p>\n<ul>\n<li><em>Les Hauts-Conteurs - Olivier Peru and Patrick McSpare</em></li>\n<li><em>Blood song - Anthony Ryan</em></li>\n<li><em>The Witcher - Andrzej Sapkowski</em></li>\n<li><em>Foundation - Isaac Asimov</em></li>\n<li><em>Misery - Stephen King</em></li>\n</ul>\n<p>I am currently reading:</p>\n<ul>\n<li><em>La guilde des ombres - Anna Triss</em></li>\n<li><em>The Farseer Trilogy - Robin Hobb</em></li>\n</ul>\n<p>My to-read pile is currently composed of:</p>\n<ul>\n<li><em>The Dark Tower - Stephen King (ep1 - The Gunslinger)</em></li>\n<li><em>The Hitchhiker's Guide to the Galaxy - Douglas Adams</em></li>\n<li><em>The wandering inn - Pirateaba</em></li>\n</ul>", "sub_title_fr": "Lecture de livres", "content_fr": "<p>J'aime lire des livres.</p>\n<p>Voici quelques-uns de mes pr\u00e9f\u00e9r\u00e9s:</p>\n<ul>\n<li><em>Les Hauts-Conteurs - Olivier Peru and Patrick McSpare</em></li>\n<li><em>Blood song - Anthony Ryan</em></li>\n<li><em>The Witcher - Andrzej Sapkowski</em></li>\n<li><em>Foundation - Isaac Asimov</em></li>\n<li><em>Misery - Stephen King</em></li>\n</ul>\n<p>Je suis actuellement en train de lire:</p>\n<ul>\n<li><em>La guilde des ombres - Anna Triss</em></li>\n<li><em>L'assassin royal - Robin Hobb</em></li>\n</ul>\n<p>Ma pile de livres \u00e0 lire est actuellement compos\u00e9e de:</p>\n<ul>\n<li><em>La tour sombre - Stephen King (ep1 - le pistolero)</em></li>\n<li><em>H2G2 - Douglas Adams</em></li>\n<li><em>The wandering inn - Pirateaba</em></li>\n</ul>"}, {"sub_title_en": "Watching Series / Movies", "content_en": "<p>I like watching series and movies. Here are some of my favorites:</p>\n<h3><strong>Series:</strong></h3>\n<ul>\n<li><em>The good place - Michael Schur</em></li>\n<li><em>Mercredi (Wednesday) - Tim Burton</em></li>\n<li><em>The walking dead - Frank Darabont</em></li>\n<li><em>Doctor Who</em></li>\n<li><em>Kaamelott - Alexandre Astier</em></li>\n<li><em>Squid Game - Hwang Dong-hyeok</em></li>\n<li><em>Hot Shot (\u7c43\u7403\u706b) (2008) - Lin He Long</em></li>\n</ul>\n<h3><strong>C-dramas:</strong></h3>\n<ul>\n<li><em>Always Home - Zhang Xiao An</em></li>\n<li><em>When I fly towards you - Mao Deshu</em></li>\n<li><em>Our generation - Zhang Kaizhou</em></li>\n<li><em>Summit of Youth - Cai Cong</em></li>\n</ul>\n<h3><strong>K-dramas:</strong></h3>\n<ul>\n<li><em>Doctors - Oh Choong-hwan</em></li>\n<li><em>Resident Playbook - Lee Min-soo</em></li>\n<li><em>I am not a robot - Jung Dae-yoon</em></li>\n</ul>\n<h3><strong>Movies:</strong></h3>\n<ul>\n<li><em>Matrix - Lana and Lilly Wachowski</em></li>\n<li><em>Men in Black - Barry Sonnenfeld</em></li>\n<li><em>Interstellar - Christopher Nolan</em></li>\n<li><em>The Fugitives / The Goat - Francis Veber</em></li>\n<li><em>OSS 117 - Michel Hazanavicius</em></li>\n<li><em>Planet of the Apes - Tim Burton</em></li>\n<li><em>Vertigo - Alfred Hitchcock</em></li>\n<li><em>The Wave - Dennis Gansel</em></li>\n<li><em>Persepolis - Marjane Satrapi and Vincent Paronnaud</em></li>\n<li><em>Wolf Children - Mamoru Hosoda</em></li>\n<li><em>My Neighbor Totoro - Hayao Miyazaki</em></li>\n<li><em>Kiki's Delivery Service - Hayao Miyazaki</em></li>\n<li><em>Howl's Moving Castle - Hayao Miyazaki</em></li>\n<li><em>Your Name - Makoto Shinkai</em></li>\n<li><em>The Girl Who Leapt Through Time - Mamoru Hosoda</em></li>\n</ul>", "sub_title_fr": "S\u00e9ries et films que j'ai aim\u00e9s", "content_fr": "<p>J'aime regarder des s\u00e9ries et des films. Voici quelques-uns de mes pr\u00e9f\u00e9r\u00e9s:</p>\n<h3><strong>S\u00e9ries:</strong></h3>\n<ul>\n<li><em>The good place - Michael Schur</em></li>\n<li><em>Mercredi (Wednesday) - Tim Burton</em></li>\n<li><em>The walking dead - Frank Darabont</em></li>\n<li><em>Doctor Who</em></li>\n<li><em>Kaamelott - Alexandre Astier</em></li>\n<li><em>Squid Game - Hwang Dong-hyeok</em></li>\n<li><em>Hot Shot (\u7c43\u7403\u706b) (2008) - Lin He Long</em></li>\n</ul>\n<h3><strong>C-dramas:</strong></h3>\n<ul>\n<li><em>Always Home - Zhang Xiao An</em></li>\n<li><em>When I fly towards you - Mao Deshu</em></li>\n<li><em>Our generation - Zhang Kaizhou</em></li>\n<li><em>Summit of Youth - Cai Cong</em></li>\n</ul>\n<h3><strong>K-dramas:</strong></h3>\n<ul>\n<li><em>Doctors - Oh Choong-hwan</em></li>\n<li><em>Resident Playbook - Lee Min-soo</em></li>\n<li><em>I am not a robot - Jung Dae-yoon</em></li>\n</ul>\n<h3><strong>Films:</strong></h3>\n<ul>\n<li><em>Matrix - Lana and Lilly Wachowski</em></li>\n<li><em>Men in Black - Barry Sonnenfeld</em></li>\n<li><em>Interstellar - Christopher Nolan</em></li>\n<li><em>Les fugitifs / La ch\u00e8vre - Francis Veber</em></li>\n<li><em>OSS 117 - Michel Hazanavicius</em></li>\n<li><em>La plan\u00e8te des singes - Tim Burton</em></li>\n<li><em>Vertigo - Alfred Hitchcock</em></li>\n<li><em>La vague - Dennis Gansel</em></li>\n<li><em>Persepolis - Marjane Satrapi and Vincent Paronnaud</em></li>\n<li><em>Les enfants loups - Mamoru Hosoda</em></li>\n<li><em>Mon voisin totoro - Hayao Miyazaki</em></li>\n<li><em>Kiki la petite sorci\u00e8re - Hayao Miyazaki</em></li>\n<li><em>Le chateau ambulant - Hayao Miyazaki</em></li>\n<li><em>Your Name - Makoto Shinkai</em></li>\n<li><em>La travers\u00e9e du temps - Mamoru Hosoda</em></li>\n</ul>"}], "_source_file": "My_Hobbies", "_source_name": "My_Hobbies"}, "My_Hobbies": {"title_en": "My Hobbies", "title_fr": "Mes Hobbies", "sections": [{"sub_title_en": "Board games and Game of Roles", "content_en": "<p>I like playing board games and game of roles with my friends and my family.</p>\n<p>Example of board games I like:</p>\n<h3><strong>Classic and Traditional Card Games</strong></h3>\n<p>Traditional trick-taking and betting games played with standard decks.</p>\n<ul>\n<li>Examples:<ul>\n<li>Belote</li>\n<li>Tarot</li>\n<li>Poker</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Fast-Paced Deck and Hand Management</strong></h3>\n<p>Modern card games focused on card combinations, set collection, and hand clearing.</p>\n<ul>\n<li>Examples:<ul>\n<li>Gang of 4</li>\n<li>President</li>\n<li>7 Yokai</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Social Deduction and Communication</strong></h3>\n<p>Games centered on word association, hidden information, and collective interpretation.</p>\n<ul>\n<li>Examples:<ul>\n<li>Codenames</li>\n<li>Dixit</li>\n<li>Blanc Manger Coco</li>\n<li>Danny</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Tactical Engine Building</strong></h3>\n<p>Resource management games where players optimize actions to build an efficient scoring system.</p>\n<ul>\n<li>Examples:<ul>\n<li>Azul</li>\n<li>Splendor</li>\n<li>Rebirth</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Tile-Laying and Territorial Expansion</strong></h3>\n<p>Strategic placement games focused on building landscapes and claiming space on a shared board.</p>\n<ul>\n<li>Examples:<ul>\n<li>Carcassonne</li>\n<li>Kingdomino</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Area Control and Strategy</strong></h3>\n<p>Macro-strategy games involving territorial dominance, resource competition, and conflict management.</p>\n<ul>\n<li>Examples:<ul>\n<li>Risk</li>\n<li>Scythe</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Cooperative and Puzzle Solving</strong></h3>\n<p>Team-based or logic-driven games centered on shared objectives and mechanical problem-solving.</p>\n<ul>\n<li>Examples:<ul>\n<li>The Gang</li>\n<li>Take Time</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Competitive Duel and Confrontation</strong></h3>\n<p>Strictly 1v1 formats featuring hidden movement, tactical positioning, or collectible deck building.</p>\n<ul>\n<li>Examples:<ul>\n<li>Tag Team</li>\n<li>Zenith</li>\n<li>Stratego</li>\n<li>Magic: The Gathering</li>\n</ul>\n</li>\n</ul>", "sub_title_fr": "Jeux de soci\u00e9t\u00e9 et jeux de r\u00f4les", "content_fr": "<p>J'aime jouer \u00e0 des jeux de soci\u00e9t\u00e9 et des jeux de r\u00f4les avec mes amis et ma famille.</p>\n<p>Voici des exemples de jeux de soci\u00e9t\u00e9 que j'aime bien :</p>\n<h3><strong>Jeux de cartes classiques et traditionnels</strong></h3>\n<p>Jeux de plis et de paris traditionnels jou\u00e9s avec des jeux de cartes standards.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Belote</li>\n<li>Tarot</li>\n<li>Poker</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de cartes modernes rapides</strong></h3>\n<p>Jeux de cartes modernes ax\u00e9s sur la combinaison de cartes, la collection de sets et le vidage de main.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Gang of 4</li>\n<li>Pr\u00e9sident</li>\n<li>7 Yokai</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de d\u00e9duction sociale et de communication</strong></h3>\n<p>Jeux centr\u00e9s sur l'association de mots, l'information cach\u00e9e et l'interpr\u00e9tation collective.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Codenames</li>\n<li>Dixit</li>\n<li>Blanc Manger Coco</li>\n<li>Danny</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de construction de moteur tactique</strong></h3>\n<p>Jeux de gestion de ressources o\u00f9 les joueurs optimisent les actions pour construire un syst\u00e8me de score efficace.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Azul</li>\n<li>Splendor</li>\n<li>Rebirth</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de placement de tuiles et d'expansion territoriale</strong></h3>\n<p>Jeux de placement strat\u00e9gique ax\u00e9s sur la construction de paysages et la revendication d'espace sur un plateau partag\u00e9.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Carcassonne</li>\n<li>Kingdomino</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de contr\u00f4le de zone et de strat\u00e9gie</strong></h3>\n<p>Jeux de macro-strat\u00e9gie impliquant la domination territoriale, la comp\u00e9tition pour les ressources et la gestion des conflits.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Risk</li>\n<li>Scythe</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux coop\u00e9ratifs et de r\u00e9solution de probl\u00e8mes</strong></h3>\n<p>Jeux d'\u00e9quipe ou bas\u00e9s sur la logique, centr\u00e9s sur des objectifs communs et la r\u00e9solution de probl\u00e8mes m\u00e9caniques.</p>\n<ul>\n<li>Exemples :<ul>\n<li>The Gang</li>\n<li>Take Time</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux comp\u00e9titifs et de confrontation</strong></h3>\n<p>Formats strictement 1v1 mettant en sc\u00e8ne des mouvements cach\u00e9s, un positionnement tactique ou la construction de decks \u00e0 collectionner.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Tag Team</li>\n<li>Zenith</li>\n<li>Stratego</li>\n<li>Magic: The Gathering</li>\n</ul>\n</li>\n</ul>"}, {"sub_title_en": "Sports", "content_en": "<p>I love playing and watching some sports, especially:</p>\n<h3><strong>Basket-ball</strong>:</h3>\n<p>I practiced in club, and now regularly outdoor, and I like following the NBA.</p>\n<h3><strong>Volley-ball</strong>:</h3>\n<p>I practiced, especially when I was in CPGE.</p>\n<h3><strong>Cycling</strong>:</h3>\n<p>I like doing bike, and following the Tour de France, Paris-Nice, La Vuelta, Le Giro, Les classiques...</p>", "sub_title_fr": "Sports", "content_fr": "<p>J'aime jouer et regarder certains sports, en particulier :</p>\n<h3><strong>Basket-ball</strong>:</h3>\n<p>J'ai pratiqu\u00e9 en club, et maintenant r\u00e9guli\u00e8rement en ext\u00e9rieur, et j'aime suivre la NBA.</p>\n<h3><strong>Volley-ball</strong>:</h3>\n<p>J'ai pratiqu\u00e9, surtout quand j'\u00e9tais en CPGE.</p>\n<h3><strong>Cyclisme</strong>:</h3>\n<p>J'aime faire du v\u00e9lo, et suivre le Tour de France, Paris-Nice, La Vuelta, Le Giro, Les classiques...</p>"}, {"sub_title_en": "Computer Science and Development", "content_en": "<p>I started programming when I was very young, and started with Python and basic web development (HTML, CSS, JS).\nI started trying to programming my own video-games, and created random websites, until I did more serious projects during my studies.</p>", "sub_title_fr": "Informatique et d\u00e9veloppement", "content_fr": "<p>J'ai commenc\u00e9 \u00e0 programmer quand j'\u00e9tais tr\u00e8s jeune, et j'ai commenc\u00e9 avec Python et le d\u00e9veloppement web de base (HTML, CSS, JS).\nJ'ai commenc\u00e9 \u00e0 essayer de programmer mes propres jeux vid\u00e9o, et j'ai cr\u00e9\u00e9 des sites web al\u00e9atoires, jusqu'\u00e0 ce que je fasse des projets plus s\u00e9rieux pendant mes \u00e9tudes.</p>"}, {"sub_title_en": "Creation and Art", "content_en": "<p>I like creating and making art. I like drawing, and I like making music (writing lyrics or composing music).\nI also like writing stories, poems, and novels.\nI also like making 3d renderings, pixel/voxel art, and other forms of digital art.</p>", "sub_title_fr": "Cr\u00e9ativit\u00e9 et art", "content_fr": "<p>J'aime cr\u00e9er et faire de l'art. J'aime dessiner, et j'aime faire de la musique (\u00e9crire des paroles ou composer de la musique).\nJ'aime aussi \u00e9crire des histoires, des po\u00e8mes et des romans.\nJ'aime aussi faire des rendus 3D, du pixel/voxel art, et d'autres formes d'art num\u00e9rique.</p>"}, {"sub_title_en": "Listening Music", "content_en": "<h3><strong>Dark Folk / Ethereal Pop</strong></h3>\n<p>Atmospheric music utilizing organic instrumentation, unique vocal timbres, and narrative-focused lyrics.</p>\n<ul>\n<li><strong>Key Artists</strong>:<ul>\n<li>AURORA <a href=\"https://music.youtube.com/channel/UCNjHgaLpdy1IMNK57pYiKiQ\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/1WgXqy2Dd70QQOU7Ay074N\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Wardruna <a href=\"https://music.youtube.com/channel/UCoK2X3nnuG7ug-Kk75r5rJQ\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/0NJ6wlOAsAJ1PN4VRdTPKA\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Kiki Rockwell <a href=\"https://music.youtube.com/channel/UCe1-VmcTA_819-tJb1Z3nKA\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/5HuKMWteBRI09tWyKeQE1F\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>East-Duo <a href=\"https://music.youtube.com/channel/UCxSP05H8BEdpu3Q0RYeGOrA\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/42v0kfdXXwjA3cLRr4DTyY\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>...</li>\n</ul>\n</li>\n<li><strong>Example Tracks</strong>:<ul>\n<li>AURORA - Running With The Wolves <a href=\"https://music.youtube.com/watch?v=06ht9MyJLT4\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/track/6r6n5OmXkdsOxN2iCj5UE0\"><i i>Blue Lock</li>\n</ul>\n</li>\n<li>\n<p><strong>Romance:</strong></p>\n<ul>\n<li>Kaguya-sama: Love is War</li>\n<li>Golden Time</li>\n<li>Blue Box</li>\n</ul>\n</li>\n<li>\n<p><strong>Sci-fi:</strong></p>\n<ul>\n<li>Cyberpunk: Edgerunners</li>\n</ul>\n</li>\n</ul>"}, {"sub_title_en": "Reading Books", "content_en": "<p>I like reading books.</p>\n<p>Here are some of my favorites:</p>\n<ul>\n<li><em>Les Hauts-Conteurs - Olivier Peru and Patrick McSpare</em></li>\n<li><em>Blood song - Anthony Ryan</em></li>\n<li><em>The Witcher - Andrzej Sapkowski</em></li>\n<li><em>Foundation - Isaac Asimov</em></li>\n<li><em>Misery - Stephen King</em></li>\n</ul>\n<p>I am currently reading:</p>\n<ul>\n<li><em>La guilde des ombres - Anna Triss</em></li>\n<li><em>The Farseer Trilogy - Robin Hobb</em></li>\n</ul>\n<p>My to-read pile is currently composed of:</p>\n<ul>\n<li><em>The Dark Tower - Stephen King (ep1 - The Gunslinger)</em></li>\n<li><em>The Hitchhiker's Guide to the Galaxy - Douglas Adams</em></li>\n<li><em>The wandering inn - Pirateaba</em></li>\n</ul>", "sub_title_fr": "Lecture de livres", "content_fr": "<p>J'aime lire des livres.</p>\n<p>Voici quelques-uns de mes pr\u00e9f\u00e9r\u00e9s:</p>\n<ul>\n<li><em>Les Hauts-Conteurs - Olivier Peru and Patrick McSpare</em></li>\n<li><em>Blood song - Anthony Ryan</em></li>\n<li><em>The Witcher - Andrzej Sapkowski</em></li>\n<li><em>Foundation - Isaac Asimov</em></li>\n<li><em>Misery - Stephen King</em></li>\n</ul>\n<p>Je suis actuellement en train de lire:</p>\n<ul>\n<li><em>La guilde des ombres - Anna Triss</em></li>\n<li><em>L'assassin royal - Robin Hobb</em></li>\n</ul>\n<p>Ma pile de livres \u00e0 lire est actuellement compos\u00e9e de:</p>\n<ul>\n<li><em>La tour sombre - Stephen King (ep1 - le pistolero)</em></li>\n<li><em>H2G2 - Douglas Adams</em></li>\n<li><em>The wandering inn - Pirateaba</em></li>\n</ul>"}, {"sub_title_en": "Watching Series / Movies", "content_en": "<p>I like watching series and movies. Here are some of my favorites:</p>\n<h3><strong>Series:</strong></h3>\n<ul>\n<li><em>The good place - Michael Schur</em></li>\n<li><em>Mercredi (Wednesday) - Tim Burton</em></li>\n<li><em>The walking dead - Frank Darabont</em></li>\n<li><em>Doctor Who</em></li>\n<li><em>Kaamelott - Alexandre Astier</em></li>\n<li><em>Squid Game - Hwang Dong-hyeok</em></li>\n<li><em>Hot Shot (\u7c43\u7403\u706b) (2008) - Lin He Long</em></li>\n</ul>\n<h3><strong>C-dramas:</strong></h3>\n<ul>\n<li><em>Always Home - Zhang Xiao An</em></li>\n<li><em>When I fly towards you - Mao Deshu</em></li>\n<li><em>Our generation - Zhang Kaizhou</em></li>\n<li><em>Summit of Youth - Cai Cong</em></li>\n</ul>\n<h3><strong>K-dramas:</strong></h3>\n<ul>\n<li><em>Doctors - Oh Choong-hwan</em></li>\n<li><em>Resident Playbook - Lee Min-soo</em></li>\n<li><em>I am not a robot - Jung Dae-yoon</em></li>\n</ul>\n<h3><strong>Movies:</strong></h3>\n<ul>\n<li><em>Matrix - Lana and Lilly Wachowski</em></li>\n<li><em>Men in Black - Barry Sonnenfeld</em></li>\n<li><em>Interstellar - Christopher Nolan</em></li>\n<li><em>The Fugitives / The Goat - Francis Veber</em></li>\n<li><em>OSS 117 - Michel Hazanavicius</em></li>\n<li><em>Planet of the Apes - Tim Burton</em></li>\n<li><em>Vertigo - Alfred Hitchcock</em></li>\n<li><em>The Wave - Dennis Gansel</em></li>\n<li><em>Persepolis - Marjane Satrapi and Vincent Paronnaud</em></li>\n<li><em>Wolf Children - Mamoru Hosoda</em></li>\n<li><em>My Neighbor Totoro - Hayao Miyazaki</em></li>\n<li><em>Kiki's Delivery Service - Hayao Miyazaki</em></li>\n<li><em>Howl's Moving Castle - Hayao Miyazaki</em></li>\n<li><em>Your Name - Makoto Shinkai</em></li>\n<li><em>The Girl Who Leapt Through Time - Mamoru Hosoda</em></li>\n</ul>", "sub_title_fr": "S\u00e9ries et films que j'ai aim\u00e9s", "content_fr": "<p>J'aime regarder des s\u00e9ries et des films. Voici quelques-uns de mes pr\u00e9f\u00e9r\u00e9s:</p>\n<h3><strong>S\u00e9ries:</strong></h3>\n<ul>\n<li><em>The good place - Michael Schur</em></li>\n<li><em>Mercredi (Wednesday) - Tim Burton</em></li>\n<li><em>The walking dead - Frank Darabont</em></li>\n<li><em>Doctor Who</em></li>\n<li><em>Kaamelott - Alexandre Astier</em></li>\n<li><em>Squid Game - Hwang Dong-hyeok</em></li>\n<li><em>Hot Shot (\u7c43\u7403\u706b) (2008) - Lin He Long</em></li>\n</ul>\n<h3><strong>C-dramas:</strong></h3>\n<ul>\n<li><em>Always Home - Zhang Xiao An</em></li>\n<li><em>When I fly towards you - Mao Deshu</em></li>\n<li><em>Our generation - Zhang Kaizhou</em></li>\n<li><em>Summit of Youth - Cai Cong</em></li>\n</ul>\n<h3><strong>K-dramas:</strong></h3>\n<ul>\n<li><em>Doctors - Oh Choong-hwan</em></li>\n<li><em>Resident Playbook - Lee Min-soo</em></li>\n<li><em>I am not a robot - Jung Dae-yoon</em></li>\n</ul>\n<h3><strong>Films:</strong></h3>\n<ul>\n<li><em>Matrix - Lana and Lilly Wachowski</em></li>\n<li><em>Men in Black - Barry Sonnenfeld</em></li>\n<li><em>Interstellar - Christopher Nolan</em></li>\n<li><em>Les fugitifs / La ch\u00e8vre - Francis Veber</em></li>\n<li><em>OSS 117 - Michel Hazanavicius</em></li>\n<li><em>La plan\u00e8te des singes - Tim Burton</em></li>\n<li><em>Vertigo - Alfred Hitchcock</em></li>\n<li><em>La vague - Dennis Gansel</em></li>\n<li><em>Persepolis - Marjane Satrapi and Vincent Paronnaud</em></li>\n<li><em>Les enfants loups - Mamoru Hosoda</em></li>\n<li><em>Mon voisin totoro - Hayao Miyazaki</em></li>\n<li><em>Kiki la petite sorci\u00e8re - Hayao Miyazaki</em></li>\n<li><em>Le chateau ambulant - Hayao Miyazaki</em></li>\n<li><em>Your Name - Makoto Shinkai</em></li>\n<li><em>La travers\u00e9e du temps - Mamoru Hosoda</em></li>\n</ul>"}], "_source_file": "My_Hobbies", "_source_name": "My_Hobbies"}, "_items": [{"title_en": "My Hobbies", "title_fr": "Mes Hobbies", "sections": [{"sub_title_en": "Board games and Game of Roles", "content_en": "<p>I like playing board games and game of roles with my friends and my family.</p>\n<p>Example of board games I like:</p>\n<h3><strong>Classic and Traditional Card Games</strong></h3>\n<p>Traditional trick-taking and betting games played with standard decks.</p>\n<ul>\n<li>Examples:<ul>\n<li>Belote</li>\n<li>Tarot</li>\n<li>Poker</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Fast-Paced Deck and Hand Management</strong></h3>\n<p>Modern card games focused on card combinations, set collection, and hand clearing.</p>\n<ul>\n<li>Examples:<ul>\n<li>Gang of 4</li>\n<li>President</li>\n<li>7 Yokai</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Social Deduction and Communication</strong></h3>\n<p>Games centered on word association, hidden information, and collective interpretation.</p>\n<ul>\n<li>Examples:<ul>\n<li>Codenames</li>\n<li>Dixit</li>\n<li>Blanc Manger Coco</li>\n<li>Danny</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Tactical Engine Building</strong></h3>\n<p>Resource management games where players optimize actions to build an efficient scoring system.</p>\n<ul>\n<li>Examples:<ul>\n<li>Azul</li>\n<li>Splendor</li>\n<li>Rebirth</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Tile-Laying and Territorial Expansion</strong></h3>\n<p>Strategic placement games focused on building landscapes and claiming space on a shared board.</p>\n<ul>\n<li>Examples:<ul>\n<li>Carcassonne</li>\n<li>Kingdomino</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Area Control and Strategy</strong></h3>\n<p>Macro-strategy games involving territorial dominance, resource competition, and conflict management.</p>\n<ul>\n<li>Examples:<ul>\n<li>Risk</li>\n<li>Scythe</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Cooperative and Puzzle Solving</strong></h3>\n<p>Team-based or logic-driven games centered on shared objectives and mechanical problem-solving.</p>\n<ul>\n<li>Examples:<ul>\n<li>The Gang</li>\n<li>Take Time</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Competitive Duel and Confrontation</strong></h3>\n<p>Strictly 1v1 formats featuring hidden movement, tactical positioning, or collectible deck building.</p>\n<ul>\n<li>Examples:<ul>\n<li>Tag Team</li>\n<li>Zenith</li>\n<li>Stratego</li>\n<li>Magic: The Gathering</li>\n</ul>\n</li>\n</ul>", "sub_title_fr": "Jeux de soci\u00e9t\u00e9 et jeux de r\u00f4les", "content_fr": "<p>J'aime jouer \u00e0 des jeux de soci\u00e9t\u00e9 et des jeux de r\u00f4les avec mes amis et ma famille.</p>\n<p>Voici des exemples de jeux de soci\u00e9t\u00e9 que j'aime bien :</p>\n<h3><strong>Jeux de cartes classiques et traditionnels</strong></h3>\n<p>Jeux de plis et de paris traditionnels jou\u00e9s avec des jeux de cartes standards.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Belote</li>\n<li>Tarot</li>\n<li>Poker</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de cartes modernes rapides</strong></h3>\n<p>Jeux de cartes modernes ax\u00e9s sur la combinaison de cartes, la collection de sets et le vidage de main.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Gang of 4</li>\n<li>Pr\u00e9sident</li>\n<li>7 Yokai</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de d\u00e9duction sociale et de communication</strong></h3>\n<p>Jeux centr\u00e9s sur l'association de mots, l'information cach\u00e9e et l'interpr\u00e9tation collective.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Codenames</li>\n<li>Dixit</li>\n<li>Blanc Manger Coco</li>\n<li>Danny</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de construction de moteur tactique</strong></h3>\n<p>Jeux de gestion de ressources o\u00f9 les joueurs optimisent les actions pour construire un syst\u00e8me de score efficace.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Azul</li>\n<li>Splendor</li>\n<li>Rebirth</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de placement de tuiles et d'expansion territoriale</strong></h3>\n<p>Jeux de placement strat\u00e9gique ax\u00e9s sur la construction de paysages et la revendication d'espace sur un plateau partag\u00e9.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Carcassonne</li>\n<li>Kingdomino</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux de contr\u00f4le de zone et de strat\u00e9gie</strong></h3>\n<p>Jeux de macro-strat\u00e9gie impliquant la domination territoriale, la comp\u00e9tition pour les ressources et la gestion des conflits.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Risk</li>\n<li>Scythe</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux coop\u00e9ratifs et de r\u00e9solution de probl\u00e8mes</strong></h3>\n<p>Jeux d'\u00e9quipe ou bas\u00e9s sur la logique, centr\u00e9s sur des objectifs communs et la r\u00e9solution de probl\u00e8mes m\u00e9caniques.</p>\n<ul>\n<li>Exemples :<ul>\n<li>The Gang</li>\n<li>Take Time</li>\n</ul>\n</li>\n</ul>\n<h3><strong>Jeux comp\u00e9titifs et de confrontation</strong></h3>\n<p>Formats strictement 1v1 mettant en sc\u00e8ne des mouvements cach\u00e9s, un positionnement tactique ou la construction de decks \u00e0 collectionner.</p>\n<ul>\n<li>Exemples :<ul>\n<li>Tag Team</li>\n<li>Zenith</li>\n<li>Stratego</li>\n<li>Magic: The Gathering</li>\n</ul>\n</li>\n</ul>"}, {"sub_title_en": "Sports", "content_en": "<p>I love playing and watching some sports, especially:</p>\n<h3><strong>Basket-ball</strong>:</h3>\n<p>I practiced in club, and now regularly outdoor, and I like following the NBA.</p>\n<h3><strong>Volley-ball</strong>:</h3>\n<p>I practiced, especially when I was in CPGE.</p>\n<h3><strong>Cycling</strong>:</h3>\n<p>I like doing bike, and following the Tour de France, Paris-Nice, La Vuelta, Le Giro, Les classiques...</p>", "sub_title_fr": "Sports", "content_fr": "<p>J'aime jouer et regarder certains sports, en particulier :</p>\n<h3><strong>Basket-ball</strong>:</h3>\n<p>J'ai pratiqu\u00e9 en club, et maintenant r\u00e9guli\u00e8rement en ext\u00e9rieur, et j'aime suivre la NBA.</p>\n<h3><strong>Volley-ball</strong>:</h3>\n<p>J'ai pratiqu\u00e9, surtout quand j'\u00e9tais en CPGE.</p>\n<h3><strong>Cyclisme</strong>:</h3>\n<p>J'aime faire du v\u00e9lo, et suivre le Tour de France, Paris-Nice, La Vuelta, Le Giro, Les classiques...</p>"}, {"sub_title_en": "Computer Science and Development", "content_en": "<p>I started programming when I was very young, and started with Python and basic web development (HTML, CSS, JS).\nI started trying to programming my own video-games, and created random websites, until I did more serious projects during my studies.</p>", "sub_title_fr": "Informatique et d\u00e9veloppement", "content_fr": "<p>J'ai commenc\u00e9 \u00e0 programmer quand j'\u00e9tais tr\u00e8s jeune, et j'ai commenc\u00e9 avec Python et le d\u00e9veloppement web de base (HTML, CSS, JS).\nJ'ai commenc\u00e9 \u00e0 essayer de programmer mes propres jeux vid\u00e9o, et j'ai cr\u00e9\u00e9 des sites web al\u00e9atoires, jusqu'\u00e0 ce que je fasse des projets plus s\u00e9rieux pendant mes \u00e9tudes.</p>"}, {"sub_title_en": "Creation and Art", "content_en": "<p>I like creating and making art. I like drawing, and I like making music (writing lyrics or composing music).\nI also like writing stories, poems, and novels.\nI also like making 3d renderings, pixel/voxel art, and other forms of digital art.</p>", "sub_title_fr": "Cr\u00e9ativit\u00e9 et art", "content_fr": "<p>J'aime cr\u00e9er et faire de l'art. J'aime dessiner, et j'aime faire de la musique (\u00e9crire des paroles ou composer de la musique).\nJ'aime aussi \u00e9crire des histoires, des po\u00e8mes et des romans.\nJ'aime aussi faire des rendus 3D, du pixel/voxel art, et d'autres formes d'art num\u00e9rique.</p>"}, {"sub_title_en": "Listening Music", "content_en": "<h3><strong>Dark Folk / Ethereal Pop</strong></h3>\n<p>Atmospheric music utilizing organic instrumentation, unique vocal timbres, and narrative-focused lyrics.</p>\n<ul>\n<li><strong>Key Artists</strong>:<ul>\n<li>AURORA <a href=\"https://music.youtube.com/channel/UCNjHgaLpdy1IMNK57pYiKiQ\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/1WgXqy2Dd70QQOU7Ay074N\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Wardruna <a href=\"https://music.youtube.com/channel/UCoK2X3nnuG7ug-Kk75r5rJQ\"><i class=\"fa-brands fa-youtube\"></i></a> <a href=\"https://open.spotify.com/intl-fr/artist/0NJ6wlOAsAJ1PN4VRdTPKA\"><i class=\"fa-brands fa-spotify\"></i></a></li>\n<li>Kiki Rockwell < il brillait, les oiseaux chantaient.</p>\n<p>Prendre du recul par rapport \u00e0 l'\u00e9cran est crucial. Une simple promenade peut compl\u00e8tement vider l'esprit.</p>\n<p>La nature offre un type sp\u00e9cifique de bruit al\u00e9atoire que notre cerveau capte naturellement, ce qui r\u00e9duit le stress et stimule la cr\u00e9ativit\u00e9 de base.</p>\n<p>J'ai d\u00e9couvert que mes meilleures id\u00e9es pour une architecture technique complexe surviennent en fait lorsque je suis \u00e0 des kilom\u00e8tres de mon EDI, g\u00e9n\u00e9ralement entour\u00e9 d'arbres.</p>\n<p>Prendre du temps pour ces moments n'est pas un luxe ; c'est un \u00e9l\u00e9ment n\u00e9cessaire d'une routine durable.</p>", "markdown_content_fr_raw": "Le temps \u00e9tait **parfait**. Le soleil brillait, les oiseaux chantaient.\n\nPrendre du recul par rapport \u00e0 l'\u00e9cran est crucial. Une simple promenade peut compl\u00e8tement vider l'esprit.\n\nLa nature offre un type sp\u00e9cifique de bruit al\u00e9atoire que notre cerveau capte naturellement, ce qui r\u00e9duit le stress et stimule la cr\u00e9ativit\u00e9 de base.\n\nJ'ai d\u00e9couvert que mes meilleures id\u00e9es pour une architecture technique complexe surviennent en fait lorsque je suis \u00e0 des kilom\u00e8tres de mon EDI, g\u00e9n\u00e9ralement entour\u00e9 d'arbres.\n\nPrendre du temps pour ces moments n'est pas un luxe ; c'est un \u00e9l\u00e9ment n\u00e9cessaire d'une routine durable.", "_source_file": "A_Day_In_The_Park", "_source_name": "A_Day_In_The_Park"}, "A_Day_In_The_Park": {"title_en": "A Day In The Park", "title_fr": "Une Journ\u00e9e Au Parc", "date": "2026-04-10", "author": "Nathan Cerisara", "tags": ["Lifestyle"], "category": "Lifestyle", "summary_en": "Just took a walk in the beautiful city park today. Let me tell you about it.", "summary_fr": "J'ai simplement pris une marche dans le beau parc de la ville aujourd'hui. Laissez-moi vous raconter.", "series": "", "image": "", "markdown_content_en_html": "<p>The w rs a specific kind of random noise that our brains naturally tune into, lowering stress and boosting baseline creativity.\n\nI've found that my best ideas for complex technical architecture actually occur when I'm miles away from my IDE, usually surrounded by trees.\n\nMaking time for these moments isn't a luxury; it's a necessary component of a sustainable routine.", "markdown_content_fr_html": "<p>Le temps \u00e9tait <strong>parfait</strong>. Le soleil brillait, les oiseaux chantaient.</p>\n<p>Prendre du recul par rapport \u00e0 l'\u00e9cran est crucial. Une simple promenade peut compl\u00e8tement vider l'esprit.</p>\n<p>La nature offre un type sp\u00e9cifique de bruit al\u00e9atoire que notre cerveau capte naturellement, ce qui r\u00e9duit le stress et stimule la cr\u00e9ativit\u00e9 de base.</p>\n<p>J'ai d\u00e9couvert que mes meilleures id\u00e9es pour une architecture technique complexe surviennent en fait lorsque je suis \u00e0 des kilom\u00e8tres de mon EDI, g\u00e9n\u00e9ralement entour\u00e9 d'arbres.</p>\n<p>Prendre du temps pour ces moments n'est pas un luxe ; c'est un \u00e9l\u00e9ment n\u00e9cessaire d'une routine durable.</p>", "markdown_content_fr_raw": "Le temps \u00e9tait **parfait**. Le soleil brillait, les oiseaux chantaient.\n\nPrendre du recul par rapport \u00e0 l'\u00e9cran est crucial. Une simple promenade peut compl\u00e8tement vider l'esprit.\n\nLa nature offre un type sp\u00e9cifique de bruit al\u00e9atoire que notre cerveau capte naturellement, ce qui r\u00e9duit le stress et stimule la cr\u00e9ativit\u00e9 de base.\n\nJ'ai d\u00e9couvert que mes meilleures id\u00e9es pour une architecture technique complexe surviennent en fait lorsque je suis \u00e0 des kilom\u00e8tres de mon EDI, g\u00e9n\u00e9ralement entour\u00e9 d'arbres.\n\nPrendre du temps pour ces moments n'est pas un luxe ; c'est un \u00e9l\u00e9ment n\u00e9cessaire d'une routine durable.", "_source_file": "A_Day_In_The_Park", "_source_name": "A_Day_In_The_Park"}, {"title_en": "Building My Own PyXML Compiler", "title_fr": "Construire Mon Propre Compilateur PyXML", "date": "2026-03-27", "author": "Nathan Cerisara", "image": "res/logo.svg", "tags": ["Python", "Static Site Generator", "Compilers"], "summary_en": "A deep dive into why and how I built a custom XML-based static site generator for my portfolio.", "summary_fr": "Une exploration profonde sur pourquoi et comment j'ai construit un g\u00e9n\u00e9rateur de site statique personnalis\u00e9 bas\u00e9 sur XML.", "category": "Tech", "series": "", "markdown_content_en_html": "<h3>Why PyXML?</h3>\n<p>Standard SSGs like Jekyll or Hugo use Markdown + YAML Frontmatter. While powerful, they often feel disconnected from the HTML structure. PyXML allows me to define <strong>custom semantic tags</strong> that map directly to high-level UI components.</p>\n<h3>Implementation Details</h3>\n<ul>\n<li><strong>Parser</strong>: Uses Python's <code>xml.etree.ElementTree</code> with custom extensions for execution blocks (<code>exec_*</code>).</li>\n<li><strong>Context</strong>: A robust state manager for variable resolution and pathing.</li>\n<li><strong>Glassmorphism</strong>: Native support for CSS backdrop filters.</li>\n</ul>\n<h3>Future Improvements</h3>\n<ul>\n<li><strong>Live Preview</strong>: Integrated dev server with hot reload.</li>\n<li><strong>Wasm Version</strong>: Running the compiler in the browser.</li>\n</ul>\n<p>The journey of building a custom XML parser began out of frustration with rigid static site generators.</p>\n<p>Jekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.</p>\n<p>By leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.</p>\n<p>Working with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.</p>", "markdown_content_en_raw": "### Why PyXML?\nStandard SSGs like Jekyll or Hugo use Markdown + YAML Frontmatter. While powerful, they often feel disconnected from the HTML structure. PyXML allows me to define **custom semantic tags** that map directly to high-level UI components.\n\n### Implementation Details\n- **Parser**: Uses Python's `xml.etree.ElementTree` with custom extensions for execution blocks (`exec_*`).\n- **Context**: A robust state manager for variable resolution and pathing.\n- **Glassmorphism**: Native support for CSS backdrop filters.\n\n### Future Improvements\n- **Live Preview**: Integrated dev server with hot reload.\n- **Wasm Version**: Running the compiler in the browser.\n\nThe journey of building a custom XML parser began out of frustration with rigid static site generators.\n\nJekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.\n\nBy leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.\n\nWorking with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.", "markdown_content_fr_html": "<h3>Pourquoi PyXML ?</h3>\n<p>Les g\u00e9n\u00e9rateurs de sites statiques standards comme Jekyll ou Hugo utilisent Markdown + YAML Frontmatter. Bien que puissants, ils donnent souvent l'impression d'\u00eatre d\u00e9connect\u00e9s de la structure HTML. PyXML me permet de d\u00e9finir des <strong>balises s\u00e9mantiques personnalis\u00e9es</strong> qui correspondent directement \u00e0 des composants d'interface utilisateur de haut niveau.</p>\n<h3>D\u00e9tails d'impl\u00e9mentation</h3>\n<ul>\n<li><strong>Parser</strong>: Utilise <code>xml.etree.ElementTree</code> de Python avec des extensions personnalis\u00e9es pour les blocs d'ex\u00e9cution (<code>exec_*</code>).</li>\n<li><strong>Contexte</strong>: Un gestionnaire d'\u00e9tat robuste pour la r\u00e9solution des variables et la gestion des chemins.</li>\n<li><strong>Glassmorphism</strong>: Support natif pour les filtres d'arri\u00e8re-plan CSS.</li>\n</ul>\n<h3>Am\u00e9liorations futures</h3>\n<ul>\n<li><strong>Aper\u00e7u en direct</strong>: Serveur de d\u00e9veloppement int\u00e9gr\u00e9 avec rechargement \u00e0 chaud.</li>\n<li><strong>Version Wasm</strong>: Ex\u00e9cution du compilateur dans le navigateur.</li>\n</ul>\n<p>Le parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.</p>\n<p>Jekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.</p>\n<p>En tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.</p>\n<p>Travailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.</p>", "markdown_content_fr_raw": "### Pourquoi PyXML ?\nLes g\u00e9n\u00e9rateurs de sites statiques standards comme Jekyll ou Hugo utilisent Markdown + YAML Frontmatter. Bien que puissants, ils donnent souvent l'impression d'\u00eatre d\u00e9connect\u00e9s de la structure HTML. PyXML me permet de d\u00e9finir des **balises s\u00e9mantiques personnalis\u00e9es** qui correspondent directement \u00e0 des composants d'interface utilisateur de haut niveau.\n\n### D\u00e9tails d'impl\u00e9mentation\n- **Parser**: Utilise `xml.etree.ElementTree` de Python avec des extensions personnalis\u00e9es pour les blocs d'ex\u00e9cution (`exec_*`).\n- **Contexte**: Un gestionnaire d'\u00e9tat robuste pour la r\u00e9solution des variables et la gestion des chemins.\n- **Glassmorphism**: Support natif pour les filtres d'arri\u00e8re-plan CSS.\n\n### Am\u00e9liorations futures\n- **Aper\u00e7u en direct**: Serveur de d\u00e9veloppement int\u00e9gr\u00e9 avec rechargement \u00e0 chaud.\n- **Version Wasm**: Ex\u00e9cution du compilateur dans le navigateur.\n\nLe parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.\n\nJekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.\n\nEn tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.\n\nTravailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.", "_source_file": "Building_PyXML", "_source_name": "Building_PyXML"}, {"title_en": "CSS Grid: 3 Tips You Didn't Know", "title_fr": "CSS Grid : 3 Astuces Que Vous Ignoriez", "date": "2026-02-18", "author": "Nathan Cerisara", "tags": ["Tech"], "category": "Tech", "summary_en": "Level up your layout game with these hidden CSS Grid properties.", "summary_fr": "Am\u00e9liorez vos mises en page avec ces propri\u00e9t\u00e9s cach\u00e9es de CSS Grid.", "series": "", "image": "", "markdown_content_en_html": "<p>Using minmax() is a game changer.</p>\n<p>Technology is evolving at an unprecedented pace, rapidly shifting how we interact ience de l'utilisateur final sur tous les appareils.</p>", "markdown_content_fr_raw": "Utiliser minmax() change vraiment la donne.\n\nLa technologie \u00e9volue \u00e0 un rythme sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.\n\nL'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.\n\nEn cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.\n\nL'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.", "_source_file": "CSS_Grid_Tips", "_source_name": "CSS_Grid_Tips"}, {"title_en": "Coffee and Rain", "title_fr": "Caf\u00e9 et Pluie", "date": "2026-04-11", "author": "Nathan Cerisara", "tags": ["Feeling"], "category": "Feeling", "summary_en": "Sometimes you just need to chill.", "summary_fr": "Parfois, il faut juste se d\u00e9tendre.", "series": "", "image": "", "markdown_content_en_html": "<p>Listening to jazz while coding today.</p>\n<p>Taking a step back from the screen is crucial. A simple walk can clear the mind entirely.</p>\n<p>Nature offers a specific kind of random noise that our brains naturally tune into, lowering stress and boosting baseline creativity.</p>\n<p>I've found that my best ideas for complex technical architecture actually occur when I'm miles away from my IDE, usually surrounded by trees.</p>\n<p>Making time for these moments isn't a luxury; it's a necessary component of a sustainable routine.</p>", "markdown_content_en_raw": "Listening to jazz while coding today.\n\nTaking a step back from the screen is crucial. A simple walk can clear the mind entirely.\n\nNature offers a specific kind of random noise that our brains naturally tune into, lowering stress and boosting baseline creativity.\n\nI've found that my best ideas for complex technical architecture actually occur when I'm miles away from my IDE, usually surrounded by trees.\n\nMaking time for these moments isn't a luxury; it's a necessary component of a sustainable routine.", "markdown_content_fr_html": "<p>J'\u00e9coute du jazz en codant aujourd'hui.</p>\n<p>Prendre du recul par rapport \u00e0 l'\u00e9cran est crucial. Une simple promenade peut compl\u00e8tement vider l'esprit.</p>\n<p>La nature offre un type sp\u00e9cifique de bruit al\u00e9atoire que notre cerveau capte naturellement, ce qui r\u00e9duit le stress et stimule la cr\u00e9ativit\u00e9 de base.</p>\n<p>J'ai d\u00e9couvert que mes meilleures id\u00e9es pour une architecture technique complexe surviennent en fait lorsque je suis \u00e0 des kilom\u00e8tres de mon EDI, g\u00e9n\u00e9ralement entour\u00e9 d'arbres.</p>\n<p>Prendre du temps pour ces moments n'est pas un luxe ; c'est un \u00e9l\u00e9ment n\u00e9cessaire d'une routine durable.</p>", "markdown_content_fr_raw": "J'\u00e9coute du jazz en codant aujourd'hui.\n\nPrendre du recul par rapport \u00e0 l'\u00e9cran est crucial. Une simple promenade peut compl\u00e8tement vider l'esprit.\n\nLa nature offre un type sp\u00e9cifique de bruit al\u00e9atoire que notre cerveau capte naturellement, ce qui r\u00e9duit le stress et stimule la cr\u00e9ativit\u00e9 de base.\n\nJ'ai d\u00e9couvert que mes meilleures id\u00e9es pour une architecture technique complexe surviennent en fait lorsque je suis \u00e0 des kilom\u00e8tres de mon EDI, g\u00e9n\u00e9ralement entour\u00e9 d'arbres.\n\nPrendre du temps pour ces moments n'est pas un luxe ; c'est un \u00e9l\u00e9ment n\u00e9cessaire d'une routine durable.", "_source_file": "Current_Mood", "_source_name": "Current_Mood"}, {"title_en": "Echoes of the Void: Departure", "title_fr": "\u00c  ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.</p>\n<p>En cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.</p>\n<p>L'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.</p>", "markdown_content_fr_raw": "Les propulseurs se sont allum\u00e9s silencieusement contre le vide.\n\nLa technologie \u00e9volue \u00e0 un rythme sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.\n\nL'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.\n\nEn cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.\n\nL'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.", "_source_file": "Echoes_Part1", "_source_name": "Echoes_Part1"}, {"title_en": "Echoes of the Void: The Signal", "title_fr": "\u00c9chos du Vide : Le Signal", "date": "2025-10-15", "author": "Nathan Cerisara", "tags": ["Art"], "category": "Art", "summary_en": "A strange transmission is intercepted.", "summary_fr": "Une \u00e9trange transmission est intercept\u00e9e.", "series": "echoes_of_the_void", "series_order": 2, "image": "", "markdown_content_en_html": "<p>It wasn't static. It was structured.</p>\n<p>Technology is evolving at an unp se ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.</p>", "markdown_content_fr_raw": "Ce n'\u00e9tait pas de l'\u00e9lectricit\u00e9 statique. C'\u00e9tait structur\u00e9.\n\nLa technologie \u00e9volue \u00e0 un rythme sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.\n\nL'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.\n\nEn cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.\n\nL'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.", "_source_file": "Echoes_Part2", "_source_name": "Echoes_Part2"}, {"title_en": "Top 5 Books I Read in 2025", "title_fr": "Mon Top 5 des Livres lus en 2025", "date": "2026-01-02", "author": "Nathan Cerisara", "tags": ["Lifestyle"], "category": "Lifestyle", "summary_en": "A short review of the best science fiction and fantasy I consumed last year.", "summary_fr": "Une courte critique de la meilleure science-fiction et fantasy que j'ai consomm\u00e9e l'ann\u00e9e derni\u00e8re.", "series": "", "image": "", "markdown_content_en_html": "<ol>\n<li>Project Hail Mary</li>\n<li>Dune\n...</li>\n</ol>\n<p>Technology is evolving at an unprecedented pace, rapidly shifting how we interact with the digital world.</p>\n<p>One of the biggest challenges is maintaining robust architecture while supporting these rapid changes. We often find that traditional frameworks become bottlenecks.</p>\n<p>By building our own tools, we unlock the flexib a\u00e7on d'interagir avec le monde num\u00e9rique.\n\nL'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.\n\nEn cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.\n\nL'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.", "_source_file": "Favorite_Books_2025", "_source_name": "Favorite_Books_2025"}, {"title_en": "Thoughts on the Future of AI", "title_fr": "R\u00e9flexions sur le Futur de l'IA", "date": "2026-03-15", "author": "Nathan Cerisara", "tags": ["Tech"], "category": "Tech", "summary_en": "Are we ready for artificial general intelligence?", "summary_fr": "Sommes-nous pr\u00eats pour l'intelligence artificielle g\u00e9n\u00e9rale ?", "series": "", "image": "", "markdown_content_en_html": "<p>The rapid advancement of LLMs is astounding.</p>\n<p>Technology is evolving at an unprecedented pace, rapidly shifting how we interact with the digital world.</p>\n<p>One of the biggest challenges is maintaining robust architecture while supporting these rapid changes. We often find that traditional frameworks become bottlenecks.</p>\n<p>By building our own tools, we unlock the flexibility to fine-tune performance and design patterns without relying on monolithic upstream updates.</p>\n<p>Performance optimization isn't just about speed; it's about reducing resource consumption and improving the end-user experience across legacy devices.</p>", "markdown_content_en_raw": "The rapid advancement of LLMs is astounding.\n\nTechnology is evolving at an unprecedented pace, rapidly shifting how we interact with the digital world.\n\nOne of the biggest challenges is maintaining robust architecture while supporting these rapid changes. We often find that traditional frameworks become bottlenecks.\n\nBy building our own tools, we unlock the flexibility to fine-tune performance and design patterns without relying on monolithic upstream updates.\n\nPerformance optimization isn't just about speed; it's about reducing resource consumption and improving the end-user experience across legacy devices.", "markdown_content_fr_html": "<p>L'avancement rapide des LLMs est stup\u00e9fiant.</p>\n<p>La technologie \u00e9volue \u00e0 un rythme sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.</p>\n<p>L'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.</p>\n<p>En cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.</p>\n<p>L'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.</p>", "markdown_content_fr_raw": "L'avancement rapide des LLMs est stup\u00e9fiant.\n\nLa technologie \u00e9volue \u00e0 un rythme sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.\n\nL'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.\n\nEn cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.\n\nL'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.", "_source_file": "Future_of_AI", "_source_name": "Future_of_AI"}, {"title_en": "The PyXML Chronicles: The Origin", "title_fr": "Les Chroniques PyXML : L'Origine", "date": "2026-01-10", "author": "Nathan Cerisara", "tags": ["Tech"], "category": "Tech", "summary_en": "Why standard SSGs weren't enough.", "summary_fr": "Pourquoi les SSG standards ne suffisaient pas.", "series": "pyxml_chronicles", "series_order": 1, "image": "", "markdown_content_en_html": "<p>I wanted more control over the DOM generation...</p>\n<p>The journey of building a custom XML parser began out of frustration with rigid static site generators.</p>\n<p>Jekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.</p>\n<p>By leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.</p>\n<p>Working with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.</p>", "markdown_content_en_raw": "I wanted more control over the DOM generation...\n\nThe journey of building a custom XML parser began out of frustration with rigid static site generators.\n\nJekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.\n\nBy leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.\n\nWorking with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.", "markdown_content_fr_html": "<p>Je voulais plus de contr\u00f4le sur la g\u00e9n\u00e9ration du DOM...</p>\n<p>Le parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.</p>\n<p>Jekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.</p>\n<p>En tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.</p>\n<p>Travailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.</p>", "markdown_content_fr_raw": "Je voulais plus de contr\u00f4le sur la g\u00e9n\u00e9ration du DOM...\n\nLe parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.\n\nJekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.\n\nEn tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.\n\nTravailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.", "_source_file": "PyXML_Part1", "_source_name": "PyXML_Part1"}, {"title_en": "The PyXML Chronicles: Parsers", "title_fr": "Les Chroniques PyXML : Les Parseurs", "date": "2026-01-20", "author": "Nathan Cerisara", "tags": ["Tech"], "category": "Tech", "summary_en": "Building the dynamic parser system.", "summary_fr": "Construction du syst\u00e8me de parseurs dynamiques.", "series": "pyxml_chronicles", "series_order": 2, "image": "", "markdown_content_en_html": "<p>We use Python's xml.etree...</p>\n<p>The journey of building a custom XML parser began out of frustration with rigid static site generators.</p>\n<p>Jekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.</p>\n<p>By leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.</p>\n<p>Working with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.</p>", "markdown_content_en_raw": "We use Python's xml.etree...\n\nThe journey of building a custom XML parser began out of frustration with rigid static site generators.\n\nJekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.\n\nBy leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.\n\nWorking with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.", "markdown_content_fr_html": "<p>Nous utilisons xml.etree de Python...</p>\n<p>Le parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustratio
