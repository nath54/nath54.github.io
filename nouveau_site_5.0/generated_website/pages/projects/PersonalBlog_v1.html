 bottlenecks.</p>\n<p>By building our own tools, we unlock the flexibility to fine-tune performance and design patterns without relying on monolithic upstream updates.</p>\n<p>Performance optimization isn't just about speed; it's about reducing resource consumption and improving the end-user experience across legacy devices.</p>", "markdown_content_en_raw": "It's the pseudo-code like readability.\n\nTechnology is evolving at an unprecedented pace, rapidly shifting how we interact with the digital world.\n\nOne of the biggest challenges is maintaining robust architecture while supporting these rapid changes. We often find that traditional frameworks become bottlenecks.\n\nBy building our own tools, we unlock the flexibility to fine-tune performance and design patterns without relying on monolithic upstream updates.\n\nPerformance optimization isn't just about speed; it's about reducing resource consumption and improving the end-user experience across legacy devices.", "markdown_content_fr_html": "<p>C'est la lisibilit\u00e9 similaire au pseudo-code.</p>\n<p>La technologie \u00e9volue \u00e0 un rythme sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.</p>\n<p>L'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.</p>\n<p>En cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.</p>\n<p>L'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.</p>", "markdown_content_fr_raw": "C'est la lisibilit\u00e9 similaire au pseudo-code.\n\nLa technologie \u00e9volue \u00e0 un rythme sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.\n\nL'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.\n\nEn cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.\n\nL'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.", "_source_file": "Why_I_Love_Python", "_source_name": "Why_I_Love_Python"}], "Building_PyXML.md": {"title_en": "Building My Own PyXML Compiler", "title_fr": "Construire Mon Propre Compilateur PyXML", "date": "2026-03-27", "author": "Nathan Cerisara", "image": "res/logo.svg", "tags": ["Python", "Static Site Generator", "Compilers"], "summary_en": "A deep dive into why and how I built a custom XML-based static site generator for my portfolio.", "summary_fr": "Une exploration profonde sur pourquoi et comment j'ai construit un g\u00e9n\u00e9rateur de site statique personnalis\u00e9 bas\u00e9 sur XML.", "category": "Tech", "series": "", "markdown_content_en_html": "<h3>Why PyXML?</h3>\n<p>Standard SSGs like Jekyll or Hugo use Markdown + YAML Frontmatter. While powerful, they often feel disconnected from the HTML structure. PyXML allows me to define <strong>custom semantic tags</strong> that map directly to high-level UI components.</p>\n<h3>Implementation Details</h3>\n<ul>\n<li><strong>Parser</strong>: Uses Python's <code>xml.etree.ElementTree</code> with custom extensions for execution blocks (<code>exec_*</code>).</li>\n<li><strong>Context</strong>: A robust state manager for variable resolution and pathing.</li>\n<li><strong>Glassmorphism</strong>: Native support for CSS backdrop filters.</li>\n</ul>\n<h3>Future Improvements</h3>\n<ul>\n<li><strong>Live Preview</strong>: Integrated dev server with hot reload.</li>\n<li><strong>Wasm Version</strong>: Running the compiler in the browser.</li>\n</ul>\n<p>The journey of building a custom XML parser began out of frustration with rigid static site generators.</p>\n<p>Jekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.</p>\n<p>By leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.</p>\n<p>Working with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.</p>", "markdown_content_en_raw": "### Why PyXML?\nStandard SSGs like Jekyll or Hugo use Markdown + YAML Frontmatter. While powerful, they often feel disconnected from the HTML structure. PyXML allows me to define **custom semantic tags** that map directly to high-level UI components.\n\n### Implementation Details\n- **Parser**: Uses Python's `xml.etree.ElementTree` with custom extensions for execution blocks (`exec_*`).\n- **Context**: A robust state manager for variable resolution and pathing.\n- **Glassmorphism**: Native support for CSS backdrop filters.\n\n### Future Improvements\n- **Live Preview**: Integrated dev server with hot reload.\n- **Wasm Version**: Running the compiler in the browser.\n\nThe journey of building a custom XML parser began out of frustration with rigid static site generators.\n\nJekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.\n\nBy leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.\n\nWorking with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.", "markdown_content_fr_html": "<h3>Pourquoi PyXML ?</h3>\n<p>Les g\u00e9n\u00e9rateurs de sites statiques standards comme Jekyll ou Hugo utilisent Markdown + YAML Frontmatter. Bien que puissants, ils donnent souvent l'impression d'\u00eatre d\u00e9connect\u00e9s de la structure HTML. PyXML me permet de d\u00e9finir des <strong>balises s\u00e9mantiques personnalis\u00e9es</strong> qui correspondent directement \u00e0 des composants d'interface utilisateur de haut niveau.</p>\n<h3>D\u00e9tails d'impl\u00e9mentation</h3>\n<ul>\n<li><strong>Parser</strong>: Utilise <code>xml.etree.ElementTree</code> de Python avec des extensions personnalis\u00e9es pour les blocs d'ex\u00e9cution (<code>exec_*</code>).</li>\n<li><strong>Contexte</strong>: Un gestionnaire d'\u00e9tat robuste pour la r\u00e9solution des variables et la gestion des chemins.</li>\n<li><strong>Glassmorphism</strong>: Support natif pour les filtres d'arri\u00e8re-plan CSS.</li>\n</ul>\n<h3>Am\u00e9liorations futures</h3>\n<ul>\n<li><strong>Aper\u00e7u en direct</strong>: Serveur de d\u00e9veloppement int\u00e9gr\u00e9 avec rechargement \u00e0 chaud.</li>\n<li><strong>Version Wasm</strong>: Ex\u00e9cution du compilateur dans le navigateur.</li>\n</ul>\n<p>Le parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.</p>\n<p>Jekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.</p>\n<p>En tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.</p>\n<p>Travailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.</p>", "markdown_content_fr_raw": "### Pourquoi PyXML ?\nLes g\u00e9n\u00e9rateurs de sites statiques standards comme Jekyll ou Hugo utilisent Markdown + YAML Frontmatter. Bien que puissants, ils donnent souvent l'impression d'\u00eatre d\u00e9connect\u00e9s de la structure HTML. PyXML me permet de d\u00e9finir des **balises s\u00e9mantiques personnalis\u00e9es** qui correspondent directement \u00e0 des composants d'interface utilisateur de haut niveau.\n\n### D\u00e9tails d'impl\u00e9mentation\n- **Parser**: Utilise `xml.etree.ElementTree` de Python avec des extensions personnalis\u00e9es pour les blocs d'ex\u00e9cution (`exec_*`).\n- **Contexte**: Un gestionnaire d'\u00e9tat robuste pour la r\u00e9solution des variables et la gestion des chemins.\n- **Glassmorphism**: Support natif pour les filtres d'arri\u00e8re-plan CSS.\n\n### Am\u00e9liorations futures\n- **Aper\u00e7u en direct**: Serveur de d\u00e9veloppement int\u00e9gr\u00e9 avec rechargement \u00e0 chaud.\n- **Version Wasm**: Ex\u00e9cution du compilateur dans le navigateur.\n\nLe parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.\n\nJekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.\n\nEn tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.\n\nTravailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.", "_source_file": "Building_PyXML", "_source_name": "Building_PyXML"}, "Building_PyXML": {"title_en": "Building My Own PyXML Compiler", "title_fr": "Construire Mon Propre Compilateur PyXML", "date": "2026-03-27", "author": "Nathan Cerisara", "image": "res/logo.svg", "tags": ["Python", "Static Site Generator", "Compilers"], "summary_en": "A deep dive into why and how I built a custom XML-based static site generator for my portfolio.", "summary_fr": "Une exploration profonde sur pourquoi et comment j'ai construit un g\u00e9n\u00e9rateur de site statique personnalis\u00e9 bas\u00e9 sur XML.", "category": "Tech", "series": "", "markdown_content_en_html": "<h3>Why PyXML?</h3>\n<p>Standard SSGs like Jekyll or Hugo use Markdown + YAML Frontmatter. While powerful, they often feel disconnected from the HTML structure. PyXML allows me to define <strong>custom semantic tags</strong> that map directly to high-level UI components.</p>\n<h3>Implementation Details</h3>\n<ul>\n<li><strong>Parser</strong>: Uses Python's <code>xml.etree.ElementTree</code> with custom extensions for execution blocks (<code>exec_*</code>).</li>\n<li><strong>Context</strong>: A robust state manager for variable resolution and pathing.</li>\n<li><strong>Glassmorphism</strong>: Native support for CSS backdrop filters.</li>\n</ul>\n<h3>Future Improvements</h3>\n<ul>\n<li><strong>Live Preview</strong>: Integrated dev server with hot reload.</li>\n<li><strong>Wasm Version</strong>: Running the compiler in the browser.</li>\n</ul>\n<p>The journey of building a custom XML parser began out of frustration with rigid static site generators.</p>\n<p>Jekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.</p>\n<p>By leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.</p>\n<p>Working with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.</p>", "markdown_content_en_raw": "### Why PyXML?\nStandard SSGs like Jekyll or Hugo use Markdown + YAML Frontmatter. While powerful, they often feel disconnected from the HTML structure. PyXML allows me to define **custom semantic tags** that map directly to high-level UI components.\n\n### Implementation Details\n- **Parser**: Uses Python's `xml.etree.ElementTree` with custom extensions for execution blocks (`exec_*`).\n- **Context**: A robust state manager for variable resolution and pathing.\n- **Glassmorphism**: Native support for CSS backdrop filters.\n\n### Future Improvements\n- **Live Preview**: Integrated dev server with hot reload.\n- **Wasm Version**: Running the compiler in the browser.\n\nThe journey of building a custom XML parser began out of frustration with rigid static site generators.\n\nJekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.\n\nBy leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.\n\nWorking with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.", "markdown_content_fr_html": "<h3>Pourquoi PyXML ?</h3>\n<p>Les g\u00e9n\u00e9rateurs de sites statiques standards comme Jekyll ou Hugo utilisent Markdown + YAML Frontmatter. Bien que puissants, ils donnent souvent l'impression d'\u00eatre d\u00e9connect\u00e9s de la structure HTML. PyXML me permet de d\u00e9finir des <strong>balises s\u00e9mantiques personnalis\u00e9es</strong> qui correspondent directement \u00e0 des composants d'interface utilisateur de haut niveau.</p>\n<h3>D\u00e9tails d'impl\u00e9mentation</h3>\n<ul>\n<li><strong>Parser</strong>: Utilise <code>xml.etree.ElementTree</code> de Python avec des extensions personnalis\u00e9es pour les blocs d'ex\u00e9cution (<code>exec_*</code>).</li>\n<li><strong>Contexte</strong>: Un gestionnaire d'\u00e9tat robuste pour la r\u00e9solution des variables et la gestion des chemins.</li>\n<li><strong>Glassmorphism</strong>: Support natif pour les filtres d'arri\u00e8re-plan CSS.</li>\n</ul>\n<h3>Am\u00e9liorations futures</h3>\n<ul>\n<li><strong>Aper\u00e7u en direct</strong>: Serveur de d\u00e9veloppement int\u00e9gr\u00e9 avec rechargement \u00e0 chaud.</li>\n<li><strong>Version Wasm</strong>: Ex\u00e9cution du compilateur dans le navigateur.</li>\n</ul>\n<p>Le parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.</p>\n<p>Jekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.</p>\n<p>En tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.</p>\n<p>Travailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.</p>", "markdown_content_fr_raw": "### Pourquoi PyXML ?\nLes g\u00e9n\u00e9rateurs de sites statiques standards comme Jekyll ou Hugo utilisent Markdown + YAML Frontmatter. Bien que puissants, ils donnent souvent l'impression d'\u00eatre d\u00e9connect\u00e9s de la structure HTML. PyXML me permet de d\u00e9finir des **balises s\u00e9mantiques personnalis\u00e9es** qui correspondent directement \u00e0 des composants d'interface utilisateur de haut niveau.\n\n### D\u00e9tails d'impl\u00e9mentation\n- **Parser**: Utilise `xml.etree.ElementTree` de Python avec des extensions personnalis\u00e9es pour les blocs d'ex\u00e9cution (`exec_*`).\n- **Contexte**: Un gestionnaire d'\u00e9tat robuste pour la r\u00e9solution des variables et la gestion des chemins.\n- **Glassmorphism**: Support natif pour les filtres d'arri\u00e8re-plan CSS.\n\n### Am\u00e9liorations futures\n- **Aper\u00e7u en direct**: Serveur de d\u00e9veloppement int\u00e9gr\u00e9 avec rechargement \u00e0 chaud.\n- **Version Wasm**: Ex\u00e9cution du compilateur dans le navigateur.\n\nLe parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.\n\nJekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.\n\nEn tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.\n\nTravailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.", "_source_file": "Building_PyXML", "_source_name": "Building_PyXML"}, "CSS_Grid_Tips.md": {"title_en": "CSS Grid: 3 Tips You Didn't Know", "title_fr": "CSS Grid : 3 Astuces Que Vous Ignoriez", "date": "2026-02-18", "author": "Nathan Cerisara", "tags": ["Tech"], "category": "Tech", "su s a specific kind of random noise that our brains naturally tune into, lowering stress and boosting baseline creativity.\n\nI've found that my best ideas for complex technical architecture actually occur when I'm miles away from my IDE, usually surrounded by trees.\n\nMaking time for these moments isn't a luxury; it's a necessary component of a sustainable routine.", "markdown_content_fr_html": "<p>J'\u00e9coute du jazz en codant aujourd'hui.</p>\n<p>Prendre du recul par rapport \u00e0 l'\u00e9cran est crucial. Une simple promenade peut compl\u00e8tement vider l'esprit.</p>\n<p>La nature offre un type sp\u00e9cifique de bruit al\u00e9atoire que notre cerveau capte naturellement, ce qui r\u00e9duit le stress et stimule la cr\u00e9ativit\u00e9 de base.</p>\n<p>J'ai d\u00e9couvert que mes meilleures id\u00e9es pour une architecture technique complexe surviennent en fait lorsque je suis \u00e0 des kilom\u00e8tres de mon EDI, g\u00e9n\u00e9ralement entour\u00e9 d'arbres.</p>\n<p>Prendre du temps pour ces moments n'est pas un luxe ; c'est un \u00e9l\u00e9ment n\u00e9cessaire d'une routine durable.</p>", "markdown_content_fr_raw": "J'\u00e9coute du jazz en codant aujourd'hui.\n\nPrendre du recul par rapport \u00e0 l'\u00e9cran est crucial. Une simple promenade peut compl\u00e8tement vider l'esprit.\n\nLa nature offre un type sp\u00e9cifique de bruit al\u00e9atoire que notre cerveau capte naturellement, ce qui r\u00e9duit le stress et stimule la cr\u00e9ativit\u00e9 de base.\n\nJ'ai d\u00e9couvert que mes meilleures id\u00e9es pour une architecture technique complexe surviennent en fait lorsque je suis \u00e0 des kilom\u00e8tres de mon EDI, g\u00e9n\u00e9ralement entour\u00e9 d'arbres.\n\nPrendre du temps pour ces moments n'est pas un luxe ; c'est un \u00e9l\u00e9ment n\u00e9cessaire d'une routine durable.", "_source_file": "Current_Mood", "_source_name": "Current_Mood"}, "Current_Mood": {"title_en": "Coffee and Rain", "title_fr": "Caf\u00e9 et Pluie", "date": "2026-04-11", ch", "summary_en": "Why standard SSGs weren't enough.", "summary_fr": "Pourquoi les SSG standards ne suffisaient pas.", "series": "pyxml_chronicles", "series_order": 1, "image": "", "markdown_content_en_html": "<p>I wanted more control over the DOM generation...</p>\n<p>The journey of building a custom XML parser began out of frustration with rigid static site generators.</p>\n<p>Jekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.</p>\n<p>By leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.</p>\n<p>Working with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.</p>", "markdown_content_en_raw": "I wanted more control over the DOM generation...\n\nThe journey of building a custom XML parser began out of frustration with rigid static site generators.\n\nJekyll, Hugo, and others are fantastic tools, but they often abstract the DOM in ways that make creating highly custom UI components difficult and verbose.\n\nBy leveraging Python's built-in element tree, the compiler directly manipulates the DOM structure, translating custom XML tags into raw, performant HTML.\n\nWorking with Python's deep standard library revealed how much power is hidden behind standard patterns, especially when handling text encodings and recursive traversal.", "markdown_content_fr_html": "<p>Je voulais plus de contr\u00f4le sur la g\u00e9n\u00e9ration du DOM...</p>\n<p>Le parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.</p>\n<p>Jekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.</p>\n<p>En tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.</p>\n<p>Travailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.</p>", "markdown_content_fr_raw": "Je voulais plus de contr\u00f4le sur la g\u00e9n\u00e9ration du DOM...\n\nLe parcours de cr\u00e9ation d'un analyseur XML personnalis\u00e9 a commenc\u00e9 par une frustration face aux g\u00e9n\u00e9rateurs de sites statiques rigides.\n\nJekyll, Hugo et les autres sont des outils fantastiques, mais ils abstraient souvent le DOM d'une mani\u00e8re qui rend la cr\u00e9ation de composants d'interface utilisateur hautement personnalis\u00e9s difficile et complexe.\n\nEn tirant parti de l'arborescence des \u00e9l\u00e9ments int\u00e9gr\u00e9s de Python, le compilateur manipule directement la structure du DOM, traduisant les balises XML personnalis\u00e9es en HTML brut et performant.\n\nTravailler avec la biblioth\u00e8que standard approfondie de Python a r\u00e9v\u00e9l\u00e9 la puissance cach\u00e9e derri\u00e8re les mod\u00e8les standards, en particulier lors du traitement des encodages de texte et de la travers\u00e9e r\u00e9cursive.", "_source_file": "PyXML_Part1", "_source_name": "PyXML_Part1"}, "PyXML_Part1": {"title_en": "The PyXML Chronicles: The Origin", "title_fr": "Les Chroniques PyXML : L'Origine", "date": "2026-01-10", "author": "Nathan Cerisara", "tags": ["Tech"], "category": "Tech", "summary_en": "Why standard SSGs weren't enough.", "summary_fr": "Pourquoi les SSG standards ne suffisaient pas.", "series": "pyxml_chronicles", "series_order": 1, "image": "", "markdown_content_en_ me sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.</p>\n<p>L'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.</p>\n<p>En cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.</p>\n<p>L'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.</p>", "markdown_content_fr_raw": "C'est la lisibilit\u00e9 similaire au pseudo-code.\n\nLa technologie \u00e9volue \u00e0 un rythme sans pr\u00e9c\u00e9dent, modifiant rapidement notre fa\u00e7on d'interagir avec le monde num\u00e9rique.\n\nL'un des plus grands d\u00e9fis est de maintenir une architecture robuste tout en accompagnant ces changements rapides. Les frameworks traditionnels deviennent souvent des goulots d'\u00e9tranglement.\n\nEn cr\u00e9ant nos propres outils, nous d\u00e9bloquons la flexibilit\u00e9 n\u00e9cessaire pour affiner les performances et les mod\u00e8les de conception sans d\u00e9pendre de mises \u00e0 jour monolithiques externes.\n\nL'optimisation des performances ne concerne pas seulement la vitesse ; il s'agit de r\u00e9duire la consommation des ressources et d'am\u00e9liorer l'exp\u00e9rience de l'utilisateur final sur tous les appareils.", "_source_file": "Why_I_Love_Python", "_source_name": "Why_I_Love_Python"}, "Why_I_Love_Python": {"title_en": "Why Python Remains My Favorite Language", "title_fr": "Pourquoi Python Reste Mon Langage Pr\u00e9f\u00e9r\u00e9", "date": "2025-11-20", "author": "Nathan Cerisara", "tags": ["Tech"], "category": "Tech", "summary_en": "After trying Go and Ru \u00e9e, faisant mon stage de 6 mois au laboratoire IRIDIA de l'Universit\u00e9 Libre de Bruxelles.</p>"}, {"sub_title_en": "2021 - 2023 : Preparatory class (Lyc\u00e9e Louis-le-Grand, Paris)", "content_en": "<p>In 2021, I started a 2-year preparatory class (CPGE) in Paris (lyc\u00e9e Louis-le-Grand). I then passed the entrance exams for the French engineering schools (concours Mines-T\u00e9l\u00e9com, Centrale-Sup\u00e9lec, X, ENS).</p>", "sub_title_fr": "2021 - 2023 : classe pr\u00e9paratoire (Lyc\u00e9e Louis-le-Grand, Paris)", "content_fr": "<p>En 2021, j'ai commenc\u00e9 une classe pr\u00e9paratoire de 2 ans (CPGE) \u00e0 Paris (lyc\u00e9e Louis-le-Grand). J'ai ensuite pass\u00e9 les concours d'entr\u00e9e aux \u00e9coles d'ing\u00e9nieurs fran\u00e7aises (concours Mines-T\u00e9l\u00e9com, Centrale-Sup\u00e9lec, X, ENS).</p>"}, {"sub_title_en": "2015 - 2021 : Second part of my childhood and high school", "content_en": "<p>In 2015, we moved into Heillecourt, a city in the suburbs of Nancy. I went to the middle school there (coll\u00e8ge Montaigu), and then to the high school in Nancy (lyc\u00e9e Henri Poincar\u00e9). I graduated in 2021 with a scientific baccalaur\u00e9at (Maths, Computer Science and Physics options).</p>", "sub_title_fr": "2015 - 2021 : Seconde partie de mon enfance et lyc\u00e9e", "content_fr": "<p>En 2015, nous avons emm\u00e9nag\u00e9 \u00e0 Heillecourt, une ville en banlieue de Nancy. Je suis all\u00e9 au coll\u00e8ge l\u00e0-bas (coll\u00e8ge Montaigu), puis au lyc\u00e9e \u00e0 Nancy (lyc\u00e9e Henri Poincar\u00e9). J'ai obtenu mon baccalaur\u00e9at scientifique en 2021 (options Maths, Informatique et Physique).</p>"}, {"sub_title_en": "2003 - 2015 : First part of my childhood", "content_en": "<p>I was born in Nancy, France. I lived in Sivry, a small village of 200 inhabitants, in the countryside, 20 km in the north of Nancy.</p>", "sub_title_fr": "2003 - 2015 : Premi\u00e8re partie de mon enfance", "content_fr": "<p>Je suis n\u00e9 \u00  personnalis\u00e9 et un design glassmorphism.", "content_en": "### The Challenge\nThe previous prototype was functional but lacked the premium feel of a modern personal brand.\n\n### The Solution\n- **PyXML Compiler**: Built a custom static site generator.\n- **Glassmorphism**: Created a design system with backdrop filters and vibrant gradients.\n- **Particles.js**: Integrated a lightweight background animation.\n\n### Key Features\n- Bilingual support (French/English).\n- Dynamic page generation from YAML/Markdown.\n- High-performance, low-dependency build pipeline.\n", "content_fr": "### Le D\u00e9fi\nLe prototype pr\u00e9c\u00e9dent \u00e9tait fonctionnel mais manquait de l'aspect premium d'une marque personnelle moderne.\n\n### La Solution\n- **Compilateur PyXML** : Cr\u00e9ation d'un g\u00e9n\u00e9rateur de site statique personnalis\u00e9.\n- **Glassmorphism** : Cr\u00e9ation d'un syst\u00e8me de design avec des filtres de fond et des d\u00e9grad\u00e9s vibrants.\n- **Particles.js** : Int\u00e9gration d'une animation l\u00e9g\u00e8re pour le fond.\n\n### Caract\u00e9ristiques Cl\u00e9s\n- Support bilingue (Fran\u00e7ais/Anglais).\n- G\u00e9n\u00e9ration de pages dynamiques \u00e0 partir de YAML/Markdown.\n- Pipeline de construction haute performance et \u00e0 faibles d\u00e9pendances.\n", "funny_comments": [{"user": "ShinySeeker", "rating": 5, "text_en": "So much glassmorphism. I tried to clean my screen because it looked so transparent.", "text_fr": "Tellement de glassmorphism. J'ai essay\u00e9 de nettoyer mon \u00e9cran parce qu'il avait l'air trop transparent."}, {"user": "ParticleAddict", "rating": 4, "text_en": "I've been chasing the background particles for 20 minutes. Please send help.", "text_fr": "Je poursuis les particules du fond depuis 20 minutes. Envoyez de l'aide."}, {"user": "BugHunter", "rating": 5, "text_en": "I found a bug. Oh wait, it was just a smudge on my monitor. 5 stars.", "text_fr": "J'ai trouv\u00e9 un bug. Ah non, c'\u00e9tait juste }, {"user": "VisualNovelty", "rating": 5, "text_en": "Finally, a VN engine where I can script a story about a taco and it actually works.", "text_fr": "Enfin un moteur de VN o\u00f9 je peux scripter une histoire de taco et \u00e7a marche vraiment."}, {"user": "FourthWallBreaker", "rating": 3, "text_en": "The main character looked at me and asked why I haven't showered. Unsubscribe.", "text_fr": "Le personnage principal m'a regard\u00e9 et m'a demand\u00e9 pourquoi j'ai pas pris de douche. D\u00e9sabonnement."}, {"user": "SoundtrackJunky", "rating": 5, "text_en": "The music loop is so good I forgot I was supposed to be reading.", "text_fr": "La boucle musicale est si bonne que j'ai oubli\u00e9 que je devais lire."}, {"user": "TyperWriter", "rating": 4, "text_en": "The text typing effect is faster than my thoughts. Which isn't saying much, but still.", "text_fr": "L'effet de texte qui d\u00e9file est plus rapide que mes pens\u00e9es. C'est pas un exploit, mais quand m\u00eame."}, {"user": "ChoiceHater", "rating": 2, "text_en": "Too many choices. I just want to be told what to do, like in real life.", "text_fr": "Trop de choix. Je veux juste qu'on me dise quoi faire, comme dans la vraie vie."}, {"user": "EngineEnthusiast", "rating": 5, "text_en": "Declarative syntax is the future. My brain stopped hurting after the first 500 lines.", "text_fr": "La syntaxe d\u00e9clarative c'est le futur. Mon cerveau a arr\u00eat\u00e9 de me faire mal apr\u00e8s les 500 premi\u00e8res lignes."}, {"user": "BackgroundHunter", "rating": 5, "text_en": "The backgrounds are so cozy I tried to move into the library scene.", "text_fr": "Les d\u00e9cors sont si cosy que j'ai essay\u00e9 d'emm\u00e9nager dans la sc\u00e8ne de la biblioth\u00e8que."}], "_source_file": "NaScene", "_source_name": "NaScene"}, "NaScene": {"name_en": "NaScene Engine", "name_fr": "Moteur NaScene", "short_description_en": "A declarative visual novel engine built with C++ and PyXML.", "short_description_fr": "Un moteur d onal brand.", "short_description_fr": "Une refonte premium en glassmorphism de ma marque personnelle.", "project_status": "In-development", "project_type": "Professional", "project_showcase_importance": 95, "icon": "res/logo.svg", "link": "https://github.com/nath54/nath54.github.io", "app_version": "5.0.0", "download_size": "15 MB", "tags": ["Python", "JavaScript", "PyXML", "CSS"], "gallery": ["res/logo.svg"], "TODOLIST": [{"name": "Design System", "checked": "true"}, {"name": "PyXML Compiler", "checked": "true"}, {"name": "Dynamic Generation", "checked": "true"}], "description_en": "A complete transformation of my personal website using a custom PyXML compiler and glassmorphism design.", "description_fr": "Une transformation compl\u00e8te de mon site personnel utilisant un compilateur PyXML personnalis\u00e9 et un design glassmorphism.", "content_en": "### The Challenge\nThe previous prototype was functional but lacked the premium feel of a modern personal brand.\n\n### The Solution\n- **PyXML Compiler**: Built a custom static site generator.\n- **Glassmorphism**: Created a design system with backdrop filters and vibrant gradients.\n- **Particles.js**: Integrated a lightweight background animation.\n\n### Key Features\n- Bilingual support (French/English).\n- Dynamic page generation from YAML/Markdown.\n- High-performance, low-dependency build pipeline.\n", "content_fr": "### Le D\u00e9fi\nLe prototype pr\u00e9c\u00e9dent \u00e9tait fonctionnel mais manquait de l'aspect premium d'une marque personnelle moderne.\n\n### La Solution\n- **Compilateur PyXML** : Cr\u00e9ation d'un g\u00e9n\u00e9rateur de site statique personnalis\u00e9.\n- **Glassmorphism** : Cr\u00e9ation d'un syst\u00e8me de design avec des filtres de fond et des d\u00e9grad\u00e9s vibrants.\n- **Particles.js** : Int\u00e9gration d'une animation l\u00e9g\u00e8re pour le fond.\n\n### Caract\u00e9ristiques Cl\u00e9s\n- Support bilingue (Fran\u00e7ais/Anglais).\n- G\u00e9n\u00e9ration de pages dynamiques
